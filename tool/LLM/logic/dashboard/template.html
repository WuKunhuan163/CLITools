<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-2: #232733;
  --border: #2d3140;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --accent: #5b8def;
  --accent-glow: rgba(91,141,239,0.15);
  --green: #4ade80;
  --red: #f87171;
  --amber: #fbbf24;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 12px;
  color: var(--text);
}

.search-box {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.search-box::placeholder { color: var(--text-dim); }
.search-box:focus { border-color: var(--accent); }

.model-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.model-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.model-item:hover { background: var(--surface-2); }
.model-item.active {
  background: var(--accent-glow);
  border: 1px solid rgba(91,141,239,0.3);
}

.model-item-name {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 3px;
}

.model-item-meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
}

.model-item-meta .calls { color: var(--accent); }

.sidebar-summary {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.main-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.4px;
}

.main-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 16px;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  min-width: 140px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 500;
}

.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }

.records-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 28px;
}

.records-table {
  width: 100%;
  border-collapse: collapse;
}

.records-table th {
  text-align: left;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 1;
  white-space: nowrap;
}

.records-table td {
  padding: 10px 12px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}

.records-table tr:hover td { background: var(--surface); }

.status-ok {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
}

.status-fail {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
}

.error-cell {
  color: var(--red);
  font-size: 11px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
}

.key-masked {
  color: var(--text-dim);
  font-size: 11px;
}

.generated-at {
  font-size: 11px;
  color: var(--text-dim);
  padding: 4px 0;
}

.limits-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.limit-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.limit-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.limit-input {
  width: 90px;
  padding: 4px 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
}
.limit-input:focus { border-color: var(--accent); }

.limit-btn {
  padding: 4px 14px;
  background: var(--accent);
  border: none;
  border-radius: 4px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
}
.limit-btn:hover { opacity: 0.9; }

.limit-status {
  font-size: 11px;
  margin-left: 4px;
}
.limit-status.ok { color: var(--green); }
.limit-status.err { color: var(--red); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">LLM Dashboard</div>
    <input type="text" class="search-box" id="searchBox" placeholder="Filter models...">
  </div>
  <div class="model-list" id="modelList"></div>
  <div class="sidebar-summary" id="sidebarSummary"></div>
</div>

<div class="main">
  <div class="main-header">
    <div>
      <div class="main-title" id="mainTitle">Select a model</div>
      <div class="main-subtitle" id="mainSubtitle">Choose a model from the sidebar to view usage records.</div>
    </div>
    <div class="generated-at" id="generatedAt"></div>
  </div>
  <div class="limits-bar" id="limitsBar" style="display:none;">
    <div class="limit-group">
      <label class="limit-label">Record Limit</label>
      <input type="number" id="inputLimit" class="limit-input" min="1" max="1048576" value="1024">
    </div>
    <div class="limit-group">
      <label class="limit-label">Cleanup Batch</label>
      <input type="number" id="inputBatch" class="limit-input" min="1" max="1048576" value="512">
    </div>
    <button class="limit-btn" id="btnSaveLimits">Save</button>
    <span class="limit-status" id="limitStatus"></span>
  </div>
  <div class="stats-row" id="statsRow" style="display:none;"></div>
  <div class="records-container" id="recordsContainer">
    <div class="empty-state">Select a model from the sidebar to view usage records.</div>
  </div>
</div>

<script>
// DATA_INJECT_POINT -- replaced by Python generator
const DASHBOARD_DATA = __DASHBOARD_DATA__;

const providers = DASHBOARD_DATA.providers || [];
const records = DASHBOARD_DATA.records || [];
const generatedAt = DASHBOARD_DATA.generated_at || '';
const apiKeys = DASHBOARD_DATA.api_keys || {};

document.getElementById('generatedAt').textContent = generatedAt ? `Generated ${generatedAt}` : '';

const modelMap = {};
records.forEach(r => {
  const key = r.provider;
  if (!modelMap[key]) modelMap[key] = [];
  modelMap[key].push(r);
});

providers.forEach(p => {
  if (!modelMap[p.name]) modelMap[p.name] = [];
});

function maskKey(key) {
  if (!key || key.length < 12) return '***';
  return key.substring(0, 6) + '...' + key.substring(key.length - 4);
}

function formatTimestamp(ts) {
  const d = new Date(ts * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function formatNumber(n) {
  if (typeof n !== 'number') return '0';
  return n.toLocaleString();
}

function renderSidebar(filter) {
  const list = document.getElementById('modelList');
  list.innerHTML = '';
  const lf = (filter || '').toLowerCase();

  let totalCalls = 0;
  let totalTokens = 0;

  const names = Object.keys(modelMap).sort();
  names.forEach(name => {
    const prov = providers.find(p => p.name === name) || {};
    const model = prov.model || name;
    const searchTarget = (name + ' ' + model).toLowerCase();
    if (lf && !searchTarget.includes(lf)) return;

    const recs = modelMap[name];
    const calls = recs.length;
    const tokens = recs.reduce((s, r) => s + (r.total_tokens || 0), 0);
    totalCalls += calls;
    totalTokens += tokens;

    const item = document.createElement('div');
    item.className = 'model-item' + (name === selectedModel ? ' active' : '');
    item.innerHTML = `
      <div class="model-item-name">${model}</div>
      <div class="model-item-meta">
        <span class="calls">${calls} calls</span>
        <span>${formatNumber(tokens)} tokens</span>
      </div>
    `;
    item.onclick = () => selectModel(name);
    list.appendChild(item);
  });

  document.getElementById('sidebarSummary').textContent =
    `${names.length} models / ${formatNumber(totalCalls)} total calls / ${formatNumber(totalTokens)} tokens`;
}

let selectedModel = null;

function selectModel(name) {
  selectedModel = name;
  renderSidebar(document.getElementById('searchBox').value);
  loadLimitsForProvider(name);
  renderDetail(name);
}

function renderDetail(name) {
  const recs = (modelMap[name] || []).slice().reverse();
  const prov = providers.find(p => p.name === name) || {};
  const model = prov.model || name;

  document.getElementById('mainTitle').textContent = model;

  const available = prov.available;
  const cm = prov.cost_model || {};
  const pricing = cm.free_tier ? 'Free tier' :
    (cm.prompt_price_per_m > 0 ? `$${cm.prompt_price_per_m}/M prompt + $${cm.completion_price_per_m}/M completion` : 'Free');
  document.getElementById('mainSubtitle').textContent =
    `${name} / ${available ? 'Available' : 'Not configured'} / ${pricing}`;

  const okCount = recs.filter(r => r.ok).length;
  const failCount = recs.filter(r => !r.ok).length;
  const totalTokens = recs.reduce((s, r) => s + (r.total_tokens || 0), 0);
  const avgLatency = okCount > 0
    ? (recs.filter(r => r.ok).reduce((s, r) => s + (r.latency_s || 0), 0) / okCount).toFixed(2)
    : '0.00';
  const totalCost = recs.reduce((s, r) => s + (r.estimated_cost_usd || 0), 0);
  const errorRate = recs.length > 0 ? (failCount / recs.length * 100).toFixed(1) : '0.0';

  const statsRow = document.getElementById('statsRow');
  statsRow.style.display = 'flex';
  statsRow.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Calls</div>
      <div class="stat-value">${formatNumber(recs.length)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Success</div>
      <div class="stat-value green">${formatNumber(okCount)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Failed</div>
      <div class="stat-value ${failCount > 0 ? 'red' : ''}">${formatNumber(failCount)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tokens</div>
      <div class="stat-value">${formatNumber(totalTokens)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Latency</div>
      <div class="stat-value">${avgLatency}s</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Est. Cost</div>
      <div class="stat-value ${totalCost > 0 ? 'amber' : ''}">$${totalCost.toFixed(4)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Error Rate</div>
      <div class="stat-value ${parseFloat(errorRate) > 5 ? 'red' : ''}">${errorRate}%</div>
    </div>
  `;

  const container = document.getElementById('recordsContainer');
  if (recs.length === 0) {
    container.innerHTML = '<div class="empty-state">No usage records for this model.</div>';
    return;
  }

  let html = `<table class="records-table">
    <thead><tr>
      <th></th>
      <th>Timestamp</th>
      <th>Prompt</th>
      <th>Completion</th>
      <th>Total</th>
      <th>Latency</th>
      <th>Cost</th>
      <th>API Key</th>
      <th>Error</th>
    </tr></thead><tbody>`;

  recs.forEach(r => {
    const statusEl = r.ok
      ? '<span class="status-ok"></span>'
      : '<span class="status-fail"></span>';
    const cost = (r.estimated_cost_usd || 0).toFixed(6);
    const keyDisplay = r.api_key_masked || maskKey(apiKeys[name] || '');
    const errText = r.error ? `<span class="error-cell" title="${r.error.replace(/"/g, '&quot;')}">${r.error.substring(0, 60)}</span>` : '';
    html += `<tr>
      <td>${statusEl}</td>
      <td>${formatTimestamp(r.timestamp)}</td>
      <td>${formatNumber(r.prompt_tokens)}</td>
      <td>${formatNumber(r.completion_tokens)}</td>
      <td>${formatNumber(r.total_tokens)}</td>
      <td>${(r.latency_s || 0).toFixed(2)}s</td>
      <td>$${cost}</td>
      <td><span class="key-masked">${keyDisplay}</span></td>
      <td>${errText}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

document.getElementById('searchBox').addEventListener('input', function() {
  renderSidebar(this.value);
});

const providerLimits = DASHBOARD_DATA.provider_limits || {};

function loadLimitsForProvider(name) {
  const limits = providerLimits[name] || { record_limit: 1024, cleanup_batch: 512 };
  document.getElementById('inputLimit').value = limits.record_limit;
  document.getElementById('inputBatch').value = limits.cleanup_batch;
  document.getElementById('limitStatus').textContent = '';
  document.getElementById('limitsBar').style.display = 'flex';
}

document.getElementById('btnSaveLimits').addEventListener('click', function() {
  const limit = parseInt(document.getElementById('inputLimit').value);
  const batch = parseInt(document.getElementById('inputBatch').value);
  const status = document.getElementById('limitStatus');

  if (isNaN(limit) || limit < 1 || limit > 1048576) {
    status.textContent = 'Limit must be 1-1048576.';
    status.className = 'limit-status err';
    return;
  }
  if (isNaN(batch) || batch < 1) {
    status.textContent = 'Batch must be at least 1.';
    status.className = 'limit-status err';
    return;
  }
  if (batch > limit) {
    status.textContent = 'Batch cannot exceed limit.';
    status.className = 'limit-status err';
    return;
  }

  if (selectedModel) {
    providerLimits[selectedModel] = { record_limit: limit, cleanup_batch: batch };
  }

  status.innerHTML = 'Run: <code style="font-size:11px;background:var(--surface-2);padding:2px 6px;border-radius:3px;">LLM limits ' + selectedModel + ' ' + limit + ' ' + batch + '</code>';
  status.className = 'limit-status ok';
});

renderSidebar('');

if (Object.keys(modelMap).length > 0) {
  selectModel(Object.keys(modelMap).sort()[0]);
}
</script>
</body>
</html>
