<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPENCLAW Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-2: #1c2128;
  --surface-3: #21262d;
  --border: #30363d;
  --border-active: #484f58;
  --text: #e6edf3;
  --text-2: #8b949e;
  --text-3: #484f58;
  --accent: #e63946;
  --accent-dim: rgba(230, 57, 70, 0.12);
  --green: #3fb950;
  --green-dim: rgba(63, 185, 80, 0.1);
  --orange: #d29922;
  --orange-dim: rgba(210, 153, 34, 0.1);
  --red: #f85149;
  --red-dim: rgba(248, 81, 73, 0.1);
  --purple: #a371f7;
  --purple-dim: rgba(163, 113, 247, 0.08);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
  --transition: 150ms ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
}

.sidebar-logo-svg {
  width: 28px; height: 28px;
  flex-shrink: 0;
}

.btn-icon {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.btn-icon:hover { border-color: var(--text-2); color: var(--text-2); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
  font-size: 13px;
  color: var(--text-2);
}
.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active { background: var(--accent-dim); color: var(--text); }

.session-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.session-dot.idle { background: var(--text-3); }
.session-dot.running { background: var(--green); animation: pulse 1.5s infinite; }
.session-dot.complete { background: var(--accent); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.session-title {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.3px;
}

/* ── Main ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.main-header {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 48px;
  flex-shrink: 0;
}

.main-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.status-pill {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.2px;
}
.status-pill.idle { background: var(--surface-3); color: var(--text-3); }
.status-pill.running { background: var(--green-dim); color: var(--green); }
.status-pill.complete { background: var(--accent-dim); color: var(--accent); }
.status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-pill.running .dot { animation: pulse 1.2s infinite; }

/* ── Messages ── */
.messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.messages > * {
  flex-shrink: 0;
}

.msg-group {
  display: flex;
  flex-direction: column;
  animation: fadeSlideIn 0.35s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* User message */
.msg-user {
  align-self: flex-end;
  max-width: 65%;
  background: var(--accent);
  color: white;
  padding: 10px 16px;
  border-radius: 18px 18px 4px 18px;
  font-size: 14px;
  line-height: 1.55;
  margin-bottom: 8px;
}

/* Assistant text */
.msg-assistant {
  padding: 14px 0 6px 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  max-width: 90%;
}
.msg-assistant strong { color: var(--text); font-weight: 600; }

/* Spacer between assistant turns (no visible line) */
.turn-spacer {
  height: 4px;
}

/* ── Tool Call Block (Cursor-style collapsible) ── */
.tool-call {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin: 6px 0;
  overflow: hidden;
  max-width: 90%;
  animation: fadeSlideIn 0.25s ease;
}

.tool-call-header {
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.tool-call-header:hover { background: rgba(255,255,255,0.03); }

.tool-call-chevron {
  color: var(--text-3);
  font-size: 16px;
  transition: transform 0.2s ease;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
.tool-call.expanded .tool-call-chevron { transform: rotate(90deg); }

.tool-icon {
  width: 20px; height: 20px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
}
.tool-icon.exec { background: var(--green-dim); color: var(--green); }
.tool-icon.read { background: var(--accent-dim); color: var(--accent); }
.tool-icon.grep { background: var(--purple-dim); color: var(--purple); }
.tool-icon.search { background: var(--orange-dim); color: var(--orange); }
.tool-icon.todo { background: var(--accent-dim); color: var(--accent); }
.tool-icon.experience { background: var(--orange-dim); color: var(--orange); }
.tool-icon.edit { background: rgba(210, 153, 34, 0.1); color: var(--orange); }
.tool-icon.think { background: var(--purple-dim); color: var(--purple); }
.tool-icon.memory { background: rgba(163, 113, 247, 0.12); color: var(--purple); }
.tool-icon.skill { background: var(--green-dim); color: var(--green); }
.tool-icon.test { background: var(--accent-dim); color: var(--accent); }

.tool-desc {
  color: var(--text);
  font-size: 12.5px;
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tool-cmd-label {
  color: var(--text-3);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}

.tool-status {
  margin-left: auto;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: 500;
  flex-shrink: 0;
}
.tool-status.success { color: var(--green); }
.tool-status.running { color: var(--orange); }
.tool-status.error { color: var(--red); }

.tool-call-body {
  display: none;
  border-top: 1px solid var(--border);
}
.tool-call.expanded .tool-call-body { display: block; }

.tool-terminal {
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.65;
  color: var(--text-2);
  white-space: pre-wrap;
  max-height: 320px;
  overflow-y: auto;
  background: var(--bg);
}

.tool-terminal-cmd {
  padding: 8px 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  background: var(--surface-3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tool-terminal-cmd .prompt { color: var(--green); font-weight: 600; }

/* ── Think Block (collapsible) ── */
.think-block {
  background: var(--purple-dim);
  border: 1px solid rgba(163, 113, 247, 0.15);
  border-radius: var(--radius);
  margin: 6px 0;
  max-width: 90%;
  overflow: hidden;
  animation: fadeSlideIn 0.25s ease;
}
.think-header {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.think-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--purple);
  letter-spacing: 0.3px;
}
.think-chevron {
  color: var(--purple);
  font-size: 14px;
  transition: transform 0.2s ease;
}
.think-block.expanded .think-chevron { transform: rotate(90deg); }
.think-body {
  display: none;
  padding: 0 12px 10px 30px;
  font-size: 12.5px;
  line-height: 1.6;
  color: rgba(163, 113, 247, 0.8);
  white-space: pre-wrap;
}
.think-block.expanded .think-body { display: block; }

/* ── Experience Badge ── */
.experience-block {
  background: var(--orange-dim);
  border: 1px solid rgba(210, 153, 34, 0.2);
  border-left: 3px solid var(--orange);
  border-radius: 2px var(--radius) var(--radius) 2px;
  padding: 10px 14px;
  margin: 8px 0;
  font-size: 12.5px;
  color: var(--orange);
  max-width: 90%;
  line-height: 1.55;
  animation: fadeSlideIn 0.3s ease;
}

/* ── Task Complete ── */
.task-complete {
  text-align: center;
  padding: 16px;
  margin: 12px 0;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  animation: fadeSlideIn 0.4s ease;
}

/* ── Typing Indicator ── */
.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 14px 0;
  color: var(--text-3);
}
.typing span {
  width: 6px; height: 6px;
  background: var(--text-2);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}

/* ── Planning Spinner ── */
.planning {
  padding: 12px 0;
  font-size: 13px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 10px;
}
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Table in Messages ── */
.msg-assistant table {
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
  width: 100%;
}
.msg-assistant th {
  text-align: left;
  padding: 7px 12px;
  border-bottom: 2px solid var(--border-active);
  color: var(--text-2);
  font-weight: 600;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.msg-assistant td {
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.msg-assistant tr:hover td { background: rgba(255,255,255,0.03); }

/* ── Input Area ── */
.input-area {
  padding: 16px 28px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-field {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 11px 16px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  transition: border-color var(--transition);
}
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--text-3); }

.btn-send {
  width: 44px; height: 44px;
  border: none;
  border-radius: var(--radius-lg);
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.btn-send:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-send:active { transform: translateY(0); }
.btn-send:disabled { opacity: 0.35; cursor: default; transform: none; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>
      <svg class="sidebar-logo-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="claw-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e63946"/><stop offset="100%" stop-color="#c41e3a"/></linearGradient></defs>
        <circle cx="16" cy="16" r="15" fill="url(#claw-grad)" opacity="0.15"/>
        <g fill="url(#claw-grad)" transform="translate(8,6)">
          <path d="M8 0C6.5 0 5.2 1.3 5 3L4 10c-.1.8.5 1.5 1.3 1.5h5.4c.8 0 1.4-.7 1.3-1.5L11 3C10.8 1.3 9.5 0 8 0z" opacity="0.9"/>
          <path d="M2 4C1 4.5 0 6 0 7.5c0 1 .5 2 1.2 2.5l2.5 2c.3.2.7 0 .6-.4L3 6.5C2.8 5.5 2.5 4.5 2 4z"/>
          <path d="M14 4c1 .5 2 2 2 3.5 0 1-.5 2-1.2 2.5l-2.5 2c-.3.2-.7 0-.6-.4L13 6.5c.2-1 .5-2 1-2.5z"/>
          <ellipse cx="8" cy="15" rx="5" ry="4.5" opacity="0.6"/>
          <ellipse cx="8" cy="15" rx="3" ry="2.8" fill="var(--bg)" opacity="0.7"/>
        </g>
      </svg>
    </h1>
    <button class="btn-icon" title="New session">+</button>
  </div>
  <div class="session-list">
    <div class="session-item active" id="session-item">
      <div class="session-dot idle" id="session-dot"></div>
      <div class="session-title" id="session-title">New Task</div>
    </div>
  </div>
  <div class="sidebar-footer">OpenClaw Agent v2.0</div>
</aside>

<main class="main">
  <div class="main-header">
    <div class="main-title" id="main-title">New Task</div>
    <div class="status-pill idle" id="status-pill">
      <div class="dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>

  <div class="messages" id="chat-area" tabindex="0"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea class="input-field" id="input" rows="1"
        placeholder="Describe your task..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();startDemo()}"></textarea>
      <button class="btn-send" id="btn-send" onclick="startDemo()"><i class="bx bx-send" style="font-size:20px"></i></button>
    </div>
  </div>
</main>

<script>
const MOCK = [
  { role: "user", content: "打开Bilibili，找到排行榜上播放量最大的10个视频" },
  {
    role: "assistant",
    title: "Find Top 10 Bilibili Videos",
    tool_calls: [
      { id: "t0", fn: "think", desc: "Analyzing the user's request", args: { thought: "The user wants top 10 Bilibili videos by view count. I should:\n1. Search for a BILIBILI browser tool\n2. Boot the session\n3. Navigate to the ranking page\n4. Extract the data" } }
    ]
  },
  { role: "tool_result", call_id: "t0", content: "(internal reasoning)" },
  {
    role: "assistant",
    text: "Let me search for available browser automation tools for Bilibili.",
    tool_calls: [
      { id: "s1", fn: "search", desc: "Search for Bilibili-related tools", args: { command: "TOOL --search \"bilibili browser\"" } }
    ]
  },
  {
    role: "tool_result", call_id: "s1",
    content: "  BILIBILI (0.87)  Browser automation for bilibili.com\n  GOOGLE.CDMCP (0.42)  Chrome DevTools MCP"
  },
  {
    role: "assistant",
    text: "Found the BILIBILI tool. Let me boot a browser session.",
    tool_calls: [
      { id: "c1", fn: "exec", desc: "Boot Bilibili browser session", args: { command: "BILIBILI boot" } }
    ]
  },
  {
    role: "tool_result", call_id: "c1",
    content: "  Boot successful\n  Session: bili_bilibili\n  State: IDLE\n  URL: https://www.bilibili.com"
  },
  {
    role: "assistant",
    text: "Session is active. Now navigating to the ranking page.",
    tool_calls: [
      { id: "c2", fn: "exec", desc: "Navigate to ranking page", args: { command: "BILIBILI --mcp-navigate ranking" } }
    ]
  },
  {
    role: "tool_result", call_id: "c2",
    content: "  Navigated to ranking\n  URL: https://www.bilibili.com/v/popular/rank/all\n  State: IDLE"
  },
  {
    role: "assistant",
    tool_calls: [
      { id: "c3", fn: "exec", desc: "Extract top 10 trending videos", args: { command: "BILIBILI --mcp-trending --limit 10" } }
    ]
  },
  {
    role: "tool_result", call_id: "c3",
    content: "Bilibili 全站排行榜 Top 10:\n\n  #1  | 我好像买到了一只星期猫         | 491.7万播放 | 贪吃的小咪-\n  #2  | 非得今儿个走啊              | 500.2万播放 | 文武俩兄弟\n  #3  | 周总理诞辰128周年           | 153.9万播放 | 大象新闻\n  #4  | 爱在一生中占多少百分比        | 248.8万播放 | 十六夜硝夜\n  #5  | 不该让爷爷看b站的           | 120.9万播放 | 逗比的雀巢\n  #6  | 浅谈周杰伦田馥甄未来走向      | 391.9万播放 | 给我一首歌的时间time\n  #7  | 「妄想天使」首场直播          | 107.9万播放 | 妄想天使唯一指定官号\n  #8  | 【Tarokiki】远航星的告别     | 68.1万播放  | Tarokiki_music\n  #9  | 全球最大机场——但是倒闭了      | 266.3万播放 | 小约翰可汗\n  #10 | 一声妈妈，一生妈妈          | 765.1万播放 | _张天琪"
  },
  {
    role: "assistant",
    text: 'Here are the <strong>Top 10 most-viewed videos</strong> on Bilibili\'s ranking page:<br><br><table><thead><tr><th>#</th><th>Title</th><th>Views</th><th>Author</th></tr></thead><tbody><tr><td>1</td><td>我好像买到了一只星期猫</td><td>491.7万</td><td>贪吃的小咪-</td></tr><tr><td>2</td><td>非得今儿个走啊</td><td>500.2万</td><td>文武俩兄弟</td></tr><tr><td>3</td><td>周总理诞辰128周年</td><td>153.9万</td><td>大象新闻</td></tr><tr><td>4</td><td>爱在一生中占多少百分比</td><td>248.8万</td><td>十六夜硝夜</td></tr><tr><td>5</td><td>不该让爷爷看b站的</td><td>120.9万</td><td>逗比的雀巢</td></tr><tr><td>6</td><td>浅谈周杰伦田馥甄未来走向</td><td>391.9万</td><td>给我一首歌的时间time</td></tr><tr><td>7</td><td>「妄想天使」首场直播</td><td>107.9万</td><td>妄想天使唯一指定官号</td></tr><tr><td>8</td><td>【Tarokiki】远航星的告别</td><td>68.1万</td><td>Tarokiki_music</td></tr><tr><td>9</td><td>全球最大机场——但是倒闭了</td><td>266.3万</td><td>小约翰可汗</td></tr><tr><td>10</td><td>一声妈妈，一生妈妈</td><td>765.1万</td><td>_张天琪</td></tr></tbody></table>',
    tool_calls: [
      { id: "td1", fn: "todo", desc: "Update task progress", args: { command: "Mark 'Extract top 10' as completed" } }
    ]
  },
  { role: "tool_result", call_id: "td1", content: "  [x] Extract top 10 videos from Bilibili ranking" },
  {
    role: "assistant",
    text: "I notice the ranking order doesn't match pure view count. Let me record this finding.",
    tool_calls: [
      { id: "c4", fn: "experience", args: { lesson: "Bilibili rankings are composite scores (views + engagement), not purely sorted by view count. #10 had 765万 views while #1 had 491万." } },
      { id: "m1", fn: "memory", desc: "Save insight about Bilibili ranking algorithm", args: { command: "SKILLS learn \"Bilibili ranking uses composite score\" --tool BILIBILI" } }
    ]
  },
  { role: "tool_result", call_id: "m1", content: "  Lesson recorded for BILIBILI" },
  {
    role: "assistant",
    text: "Task complete. The top 10 videos have been retrieved from Bilibili's ranking page.",
    complete: true
  }
];

const $ = id => document.getElementById(id);
const chatArea = $('chat-area');
const inputEl = $('input');
const btnSend = $('btn-send');

let running = false;

function setStatus(text, type) {
  $('status-text').textContent = text;
  $('status-pill').className = `status-pill ${type}`;
}

function setTitle(t) {
  $('main-title').textContent = t;
  $('session-title').textContent = t;
}

function scrollEnd() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function appendEl(tag, cls, html, parent) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html) el.innerHTML = html;
  (parent || chatArea).appendChild(el);
  scrollEnd();
  return el;
}

async function typeText(container, rawHtml, speed) {
  speed = speed || 12;
  const el = appendEl('div', 'msg-assistant', '', container);

  const hasHtml = /<(table|strong|br|em)\b/i.test(rawHtml);
  if (hasHtml) {
    let buf = '';
    for (let i = 0; i < rawHtml.length; i++) {
      buf += rawHtml[i];
      if (rawHtml[i] === '>' || i % 4 === 0) {
        el.innerHTML = buf;
        scrollEnd();
        await sleep(speed);
      }
    }
    el.innerHTML = rawHtml;
  } else {
    const plain = rawHtml.replace(/<[^>]+>/g, '');
    let out = '';
    for (const ch of plain) {
      out += ch;
      el.textContent = out;
      scrollEnd();
      await sleep(speed);
    }
  }
  scrollEnd();
}

function makeToolCallEl(name, display, desc) {
  const icons = {
    exec: '$', read: 'R', grep: 'G', search: 'S', todo: 'T',
    experience: '!', edit: 'E', think: '?', memory: 'M', skill: 'K', test: 'U'
  };
  desc = desc || display;
  const el = appendEl('div', 'tool-call',
    '<div class="tool-call-header" onclick="this.parentElement.classList.toggle(\'expanded\')">'
    + '<div class="tool-call-chevron"><i class="bx bx-chevron-right"></i></div>'
    + '<div class="tool-icon ' + name + '">' + (icons[name] || '?') + '</div>'
    + '<span class="tool-desc">' + esc(desc) + '</span>'
    + '<span class="tool-cmd-label">' + esc(name.toUpperCase()) + '</span>'
    + '<div class="tool-status running" data-tc="status">'
    + '<div class="spinner" style="width:10px;height:10px;border-width:1.5px"></div>'
    + '</div></div>'
    + '<div class="tool-call-body">'
    + '<div class="tool-terminal-cmd"><span class="prompt">$</span> ' + esc(display) + '</div>'
    + '<div class="tool-terminal" data-tc="output"></div>'
    + '</div>');
  return el;
}

function finishToolCall(el, ok, output) {
  const s = el.querySelector('[data-tc=status]');
  if (!s) return;
  s.className = `tool-status ${ok ? 'success' : 'error'}`;
  s.innerHTML = ok
    ? '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 12.5l-4-4 1-1 3 3 7-7 1 1z"/></svg>'
    : '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM7 4h2v5H7V4zm0 6h2v2H7v-2z"/></svg>';
  if (output) {
    const out = el.querySelector('[data-tc=output]');
    if (out) out.textContent = output;
  }
}

function addExperience(lesson) {
  appendEl('div', 'experience-block',
    `<span>${esc(lesson)}</span>`);
}

function addThinkBlock(thought) {
  const el = appendEl('div', 'think-block',
    '<div class="think-header" onclick="this.parentElement.classList.toggle(\'expanded\')">'
    + '<i class="bx bx-chevron-right think-chevron"></i>'
    + '<span class="think-label">Thinking</span>'
    + '</div>'
    + '<div class="think-body">' + esc(thought) + '</div>');
  return el;
}

function addTaskComplete() {
  appendEl('div', 'task-complete',
    `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm3.5 6l-4 4-1 0-2-2 1-1 1.5 1.5L10.5 5l1 1z"/></svg> Task completed`);
  setStatus('Completed', 'complete');
  $('session-dot').className = 'session-dot complete';
}

function addTyping() {
  const el = appendEl('div', 'typing', '<span></span><span></span><span></span>');
  el.id = 'typing-ind';
  return el;
}

function removeTyping() {
  const el = $('typing-ind');
  if (el) el.remove();
}

function addPlanning() {
  const el = appendEl('div', 'planning', '<div class="spinner"></div> Planning next move\u2026');
  el.id = 'planning-ind';
}

function removePlanning() {
  const el = $('planning-ind');
  if (el) el.remove();
}

async function startDemo() {
  if (running) return;
  running = true;
  btnSend.disabled = true;
  inputEl.disabled = true;
  inputEl.value = '';

  setStatus('Running', 'running');
  $('session-dot').className = 'session-dot running';

  for (const entry of MOCK) {
    /* ── User Message ── */
    if (entry.role === 'user') {
      appendEl('div', 'msg-user', esc(entry.content));
      await sleep(350);
      addTyping();
      await sleep(1000);
      removeTyping();
      continue;
    }

    /* ── Tool Results are consumed by tool_calls handler ── */
    if (entry.role === 'tool_result') continue;

    /* ── Assistant Turn ── */
    if (entry.role === 'assistant') {
      if (entry.title) setTitle(entry.title);

      if (entry.text) {
        const grp = appendEl('div', 'msg-group');
        await typeText(grp, entry.text);
        await sleep(250);
      }

      if (entry.tool_calls) {
        for (const tc of entry.tool_calls) {
          const name = tc.fn;
          const display = name === 'exec' ? tc.args.command
            : name === 'experience' ? tc.args.lesson
            : JSON.stringify(tc.args);
          const desc = tc.desc || display;

          if (name === 'experience') {
            addExperience(tc.args.lesson);
            await sleep(500);
            continue;
          }

          if (name === 'think') {
            addThinkBlock(tc.args.thought);
            await sleep(600);
            continue;
          }

          const tcEl = makeToolCallEl(name, display, desc);
          await sleep(900);

          const result = MOCK.find(e => e.role === 'tool_result' && e.call_id === tc.id);
          if (result) {
            finishToolCall(tcEl, true, result.content);
          } else {
            finishToolCall(tcEl, true);
          }
          await sleep(350);

          addPlanning();
          await sleep(900);
          removePlanning();
        }
      }

      if (entry.complete) {
        await sleep(300);
        addTaskComplete();
      }

      if (!entry.complete) {
        appendEl('div', 'turn-spacer');
      }
    }
  }

  btnSend.disabled = false;
  inputEl.disabled = false;
  inputEl.focus();
}

inputEl.value = MOCK[0].content;
</script>
