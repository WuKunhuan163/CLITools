<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1F99E;</text></svg>">
<title>OPENCLAW Agent</title>
<style>
:root {
  --bg: #0e0c0c;
  --sidebar-bg: #1a1210;
  --chat-bg: #151010;
  --input-bg: #241a18;
  --text: #e8e0de;
  --text-dim: #7a6b66;
  --text-bright: #f5f0ee;
  --accent: #d32f2f;
  --accent-glow: rgba(211, 47, 47, 0.15);
  --accent-light: #ff5252;
  --user-bubble: #2d1f1c;
  --agent-bubble: #1e1412;
  --border: #3a2420;
  --danger: #e05555;
  --success: #4ecf7a;
  --font: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  --sidebar-w: 260px;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* --- Sidebar --- */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--accent);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-logo {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  object-fit: cover;
}

.btn-new {
  width: 28px; height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-new:hover { border-color: var(--accent); color: var(--accent); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active { background: var(--accent-glow); }

.session-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.session-dot.idle { background: var(--text-dim); }
.session-dot.running { background: var(--success); animation: pulse-dot 1.5s infinite; }
.session-dot.complete { background: var(--accent); }
.session-dot.error { background: var(--danger); }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.session-title {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.session-delete {
  opacity: 0;
  background: none; border: none;
  color: var(--text-dim); cursor: pointer;
  font-size: 14px; padding: 2px;
  transition: opacity 0.15s;
}
.session-item:hover .session-delete { opacity: 1; }
.session-delete:hover { color: var(--danger); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
}

/* --- Main chat area --- */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--chat-bg);
}

.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 48px;
}

.chat-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}

.status-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
}
.status-badge.running {
  background: rgba(78, 207, 122, 0.12);
  color: var(--success);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
}

.message.user {
  align-self: flex-end;
  background: var(--user-bubble);
  border-bottom-right-radius: 3px;
}

.message.assistant {
  align-self: flex-start;
  background: var(--agent-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
}

.message.system {
  align-self: center;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  font-style: italic;
  padding: 4px 0;
}

.message pre {
  background: rgba(0,0,0,0.3);
  padding: 8px 10px;
  border-radius: 6px;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 12px;
  margin: 6px 0;
  line-height: 1.45;
}

.message code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(0,0,0,0.2);
  padding: 1px 4px;
  border-radius: 3px;
}

.typing-indicator {
  align-self: flex-start;
  padding: 12px 16px;
  color: var(--text-dim);
  font-size: 13px;
  display: none;
}
.typing-indicator.visible { display: flex; gap: 4px; align-items: center; }
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}

/* --- Input area --- */
.input-area {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 160px;
  line-height: 1.45;
  transition: border-color 0.15s;
}

.input-row textarea:focus { border-color: var(--accent-light); }

.input-row textarea::placeholder { color: var(--text-dim); }

.btn-send {
  width: 40px; height: 40px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-send:hover { filter: brightness(1.15); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

.btn-stop {
  width: 40px; height: 40px;
  border-radius: 10px;
  border: 1.5px solid var(--danger);
  background: transparent;
  color: var(--danger);
  cursor: pointer;
  font-size: 14px;
  display: none;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-stop.visible { display: flex; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 12px;
}

.empty-state .icon { font-size: 40px; opacity: 0.3; }
.empty-state img { filter: drop-shadow(0 0 20px rgba(211, 47, 47, 0.2)); }
.empty-state p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* Mobile */
@media (max-width: 700px) {
  .sidebar { width: 220px; }
  :root { --sidebar-w: 220px; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1 id="app-title"><img src="assets/openclaw-avatar.png" alt="" class="sidebar-logo">OPENCLAW</h1>
    <button class="btn-new" id="btn-new-session" title="New Session">+</button>
  </div>
  <div class="session-list" id="session-list"></div>
  <div class="sidebar-footer">
    <span id="connection-status">Disconnected</span>
    <span id="session-count">0 sessions</span>
  </div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <span class="chat-title" id="chat-title">Select or create a session</span>
    <span class="status-badge" id="status-badge">Idle</span>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <img src="assets/openclaw-logo-text.png" alt="OpenClaw" style="width: 220px; opacity: 0.6;">
      <p>Start a new conversation</p>
    </div>
  </div>
  <div class="typing-indicator" id="typing">
    <span></span><span></span><span></span>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Type your task..." rows="1"></textarea>
      <button class="btn-send" id="btn-send" title="Send">&#8593;</button>
      <button class="btn-stop" id="btn-stop" title="Stop">&#9632;</button>
    </div>
  </div>
</div>

<script>
/**
 * OPENCLAW HTML Chatbot Blueprint — Client Logic
 *
 * Communicates with the Python backend via WebSocket or HTTP polling.
 * Designed as a reusable blueprint: tools customize via config object.
 */
(function() {
  "use strict";

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  // --- State ---
  const state = {
    sessions: [],
    currentSessionId: null,
    pipelineRunning: false,
    connected: false,
    ws: null,
  };

  // Config — overridable by host tool
  const config = window.__OPENCLAW_CONFIG || {
    title: "OPENCLAW",
    wsUrl: `ws://${location.hostname}:${location.port}/ws`,
    apiUrl: `http://${location.hostname}:${location.port}/api`,
  };

  // --- DOM refs ---
  const dom = {
    title: $("#app-title"),
    sessionList: $("#session-list"),
    chatTitle: $("#chat-title"),
    statusBadge: $("#status-badge"),
    messages: $("#messages"),
    emptyState: $("#empty-state"),
    typing: $("#typing"),
    input: $("#input"),
    btnSend: $("#btn-send"),
    btnStop: $("#btn-stop"),
    btnNew: $("#btn-new-session"),
    connStatus: $("#connection-status"),
    sessionCount: $("#session-count"),
  };

  // --- API ---
  async function apiCall(method, path, body) {
    const opts = {
      method,
      headers: { "Content-Type": "application/json" },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${config.apiUrl}${path}`, opts);
    return res.json();
  }

  // --- WebSocket ---
  function connectWs() {
    if (state.ws) state.ws.close();
    try {
      state.ws = new WebSocket(config.wsUrl);
    } catch (e) {
      console.log("WebSocket unavailable, falling back to polling");
      state.connected = false;
      updateConnectionStatus();
      startPolling();
      return;
    }

    state.ws.onopen = () => {
      state.connected = true;
      updateConnectionStatus();
    };

    state.ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleServerMessage(msg);
      } catch {}
    };

    state.ws.onclose = () => {
      state.connected = false;
      updateConnectionStatus();
      setTimeout(connectWs, 3000);
    };

    state.ws.onerror = () => {
      state.connected = false;
      updateConnectionStatus();
    };
  }

  let pollTimer = null;
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(async () => {
      try {
        const data = await apiCall("GET", "/status");
        if (data.ok) {
          state.connected = true;
          updateConnectionStatus();
          if (data.sessions) {
            state.sessions = data.sessions;
            renderSidebar();
          }
          if (data.pipeline_running !== undefined) {
            state.pipelineRunning = data.pipeline_running;
            updatePipelineUI();
          }
        }
      } catch {
        state.connected = false;
        updateConnectionStatus();
      }
    }, 2000);
  }

  function sendWs(type, payload) {
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
      state.ws.send(JSON.stringify({ type, ...payload }));
    } else {
      if (type === "send_message") {
        apiCall("POST", "/send", {
          session_id: payload.session_id,
          text: payload.text,
        });
      } else if (type === "create_session") {
        apiCall("POST", "/sessions").then((d) => {
          if (d.ok && d.session) {
            state.sessions.push(d.session);
            switchSession(d.session.id);
            renderSidebar();
          }
        });
      } else if (type === "delete_session") {
        apiCall("DELETE", `/sessions/${payload.session_id}`).then(() => {
          state.sessions = state.sessions.filter((s) => s.id !== payload.session_id);
          if (state.currentSessionId === payload.session_id) {
            state.currentSessionId = null;
            renderMessages([]);
          }
          renderSidebar();
        });
      }
    }
  }

  function handleServerMessage(msg) {
    switch (msg.type) {
      case "sessions":
        state.sessions = msg.sessions || [];
        renderSidebar();
        break;
      case "message":
        if (msg.session_id === state.currentSessionId) {
          appendMessage(msg.role, msg.content);
        }
        break;
      case "title_update":
        const s = state.sessions.find((s) => s.id === msg.session_id);
        if (s) {
          s.title = msg.title;
          renderSidebar();
          if (msg.session_id === state.currentSessionId) {
            dom.chatTitle.textContent = msg.title;
          }
        }
        break;
      case "pipeline_status":
        state.pipelineRunning = msg.running;
        updatePipelineUI();
        break;
      case "session_created":
        if (msg.session) {
          state.sessions.unshift(msg.session);
          renderSidebar();
          switchSession(msg.session.id);
        }
        break;
      case "typing":
        dom.typing.classList.toggle("visible", msg.active);
        break;
      case "status":
        if (msg.text) dom.statusBadge.textContent = msg.text;
        break;
    }
  }

  // --- Rendering ---
  function renderSidebar() {
    dom.sessionList.innerHTML = "";
    state.sessions.forEach((s) => {
      const el = document.createElement("div");
      el.className = `session-item${s.id === state.currentSessionId ? " active" : ""}`;
      el.setAttribute("role", "button");
      el.setAttribute("tabindex", "0");
      el.setAttribute("aria-label", escHtml(s.title || "New Session"));
      el.innerHTML = `
        <div class="session-dot ${s.status || "idle"}"></div>
        <div class="session-title">${escHtml(s.title || "New Session")}</div>
        <button class="session-delete" title="Delete">&times;</button>
      `;
      el.addEventListener("click", (e) => {
        if (e.target.closest(".session-delete")) return;
        switchSession(s.id);
      });
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); switchSession(s.id); }
      });
      el.querySelector(".session-delete").addEventListener("click", (e) => {
        e.stopPropagation();
        deleteSession(s.id);
      });
      dom.sessionList.appendChild(el);
    });
    dom.sessionCount.textContent = `${state.sessions.length} session${state.sessions.length !== 1 ? "s" : ""}`;
  }

  function renderMessages(messages) {
    dom.messages.innerHTML = "";
    if (!messages || messages.length === 0) {
      dom.messages.innerHTML = `<div class="empty-state"><img src="assets/openclaw-logo-text.png" alt="OpenClaw" style="width: 220px; opacity: 0.6;"><p>Send a message to begin</p></div>`;
      return;
    }
    messages.forEach((m) => appendMessage(m.role, m.content, false));
    scrollToBottom();
  }

  function appendMessage(role, content, scroll = true) {
    const empty = dom.messages.querySelector(".empty-state");
    if (empty) empty.remove();

    const el = document.createElement("div");
    el.className = `message ${role}`;
    el.innerHTML = formatContent(content);
    dom.messages.appendChild(el);
    if (scroll) scrollToBottom();
  }

  function formatContent(text) {
    if (!text) return "";
    let html = escHtml(text);
    html = html.replace(/```([\s\S]*?)```/g, "<pre>$1</pre>");
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    html = html.replace(/\n/g, "<br>");
    return html;
  }

  function escHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      dom.messages.scrollTop = dom.messages.scrollHeight;
    });
  }

  function updatePipelineUI() {
    dom.btnStop.classList.toggle("visible", state.pipelineRunning);
    dom.statusBadge.textContent = state.pipelineRunning ? "Running" : "Idle";
    dom.statusBadge.className = `status-badge${state.pipelineRunning ? " running" : ""}`;
  }

  function updateConnectionStatus() {
    dom.connStatus.textContent = state.connected ? "Connected" : "Disconnected";
    dom.connStatus.style.color = state.connected ? "var(--success)" : "var(--text-dim)";
  }

  // --- Actions ---
  function switchSession(id) {
    state.currentSessionId = id;
    const s = state.sessions.find((s) => s.id === id);
    dom.chatTitle.textContent = s ? (s.title || "New Session") : "";
    renderSidebar();

    if (s && s.messages) {
      renderMessages(s.messages);
    } else {
      apiCall("GET", `/sessions/${id}/messages`).then((d) => {
        if (d.ok) renderMessages(d.messages || []);
      }).catch(() => renderMessages([]));
    }
  }

  function createSession() {
    sendWs("create_session", {});
  }

  function deleteSession(id) {
    sendWs("delete_session", { session_id: id });
  }

  function sendMessage() {
    const text = dom.input.value.trim();
    if (!text || !state.currentSessionId) return;

    dom.input.value = "";
    autoResize();
    appendMessage("user", text);
    sendWs("send_message", { session_id: state.currentSessionId, text });
  }

  function stopPipeline() {
    sendWs("stop_pipeline", { session_id: state.currentSessionId });
  }

  // --- Auto-resize textarea ---
  function autoResize() {
    dom.input.style.height = "auto";
    dom.input.style.height = Math.min(dom.input.scrollHeight, 160) + "px";
  }

  // --- Event Listeners ---
  dom.btnNew.addEventListener("click", createSession);
  dom.btnSend.addEventListener("click", sendMessage);
  dom.btnStop.addEventListener("click", stopPipeline);

  dom.input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  dom.input.addEventListener("input", autoResize);

  // --- Init ---
  if (config.title) dom.title.textContent = config.title;
  connectWs();

  // Expose API for external control
  window.__OPENCLAW = {
    createSession,
    switchSession,
    sendMessage: (text) => {
      dom.input.value = text;
      sendMessage();
    },
    getState: () => ({ ...state }),
    deleteSession,
    stopPipeline,
  };

})();
</script>
</body>
</html>
