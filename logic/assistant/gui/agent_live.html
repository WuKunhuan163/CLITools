const CALLS_PER_PAGE = 8;
const MAX_STORED_CALLS = 1024;
const _callsPageState = {};

function renderCallsTable(calls, tableId) {
  if (!calls.length) return '';
  const all = calls.slice(-MAX_STORED_CALLS).reverse();
  const totalPages = Math.max(1, Math.ceil(all.length / CALLS_PER_PAGE));
  if (!_callsPageState[tableId]) _callsPageState[tableId] = 1;
  const page = Math.min(_callsPageState[tableId], totalPages);
  const start = (page - 1) * CALLS_PER_PAGE;
  const pageItems = all.slice(start, start + CALLS_PER_PAGE);

  const pagerHtml = totalPages > 1 ? `<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:11px;color:var(--text-3);">
    <button onclick="_callsPageNav('${tableId}',-1)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-2);cursor:pointer;padding:2px 8px;font-size:11px;" ${page <= 1 ? 'disabled' : ''}>&lsaquo;</button>
    <span>Page ${page}/${totalPages}</span>
    <button onclick="_callsPageNav('${tableId}',1)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-2);cursor:pointer;padding:2px 8px;font-size:11px;" ${page >= totalPages ? 'disabled' : ''}>&rsaquo;</button>
  </div>` : '';

  return `<div style="margin-top:10px;font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;">Recent Calls</div>
    <table class="settings-table"><thead><tr><th>Time</th><th>Model</th><th>In</th><th>Out</th><th>Latency</th><th>Status</th></tr></thead><tbody>
    ${pageItems.map(c => `<tr>
      <td>${fmtTime(c.timestamp)}</td>
      <td>${esc(MODEL_DISPLAY_NAMES[c.model] || c.model || '-')}</td>
      <td>${c.input_tokens || '-'}</td>
      <td>${c.output_tokens || '-'}</td>
      <td>${c.latency_s ? c.latency_s + 's' : '-'}</td>
      <td class="${c.ok ? 'td-ok' : 'td-err'}">${c.ok ? 'OK' : 'ERR'}</td>
    </tr>`).join('')}
    </tbody></table>${pagerHtml}`;
}

function _callsPageNav(tableId, delta) {
  _callsPageState[tableId] = (_callsPageState[tableId] || 1) + delta;
  renderSettingsTab();
}

function fmtPriceBadge(m, modelKey) {
  const onclick = modelKey ? ` onclick="openPriceOverlay('${modelKey}',event)" style="cursor:pointer;"` : '';
  if (m.free_tier) return `<span class="settings-badge free"${onclick}>Free</span>`;
  if (m.input_price > 0 || m.output_price > 0) {
    return `<span class="settings-badge paid"${onclick}>${_pricePairStr(m.input_price, m.output_price)}</span>`;
  }
  return `<span class="settings-badge paid"${onclick}>Paid</span>`;
}
function fmtProviderPriceInner(m) {
  if (m.free_tier) return '<span class="price-inner free">Free</span>';
  if (m.input_price > 0 || m.output_price > 0) {
    return `<span class="price-inner paid">${_pricePairStr(m.input_price, m.output_price)}</span>`;
  }
  return '';
}
function _convertPrice(usdAmount) {
  if (displayCurrency === 'USD') return usdAmount;
  const info = (usageData.rates || {})[displayCurrency];
  if (!info) return usdAmount;
  return usdAmount * info.rate;
}
function _priceStr(usdAmount) {
  const converted = _convertPrice(usdAmount);
  const info = (usageData.rates || {})[displayCurrency];
  const sym = info ? info.symbol : '$';
  const prec = info ? Math.max(info.precision, 0) : 2;
  return sym + converted.toFixed(prec);
}
function _pricePairStr(usdIn, usdOut) {
  const ci = _convertPrice(usdIn);
  const co = _convertPrice(usdOut);
  const info = (usageData.rates || {})[displayCurrency];
  const sym = info ? info.symbol : '$';
  const prec = info ? Math.max(info.precision, 0) : 2;
  return sym + ci.toFixed(prec) + ',' + sym + co.toFixed(prec) + '/M';
}
function fmtProviderName(raw) {
  if (!raw) return '';
  if (raw !== raw.toLowerCase()) return raw;
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}
function fmtTokens(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n); }
function fmtTime(ts) { if (!ts) return '-'; const d = new Date(ts * 1000); return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function maskKey(k) { if (!k || k.length < 8) return '••••'; return k.slice(0, 4) + '••••' + k.slice(-4); }

let _provOrderState = null;
function openProviderOrderOverlay(modelName) {
  const models = usageData.models || {};
  const m = models[modelName];
  if (!m || !m.providers || m.providers.length < 2) return;

  _provOrderState = { model: modelName, providers: [...m.providers], selected: 0 };
  const overlay = document.createElement('div');
  overlay.className = 'sub-overlay';
  overlay.id = 'prov-order-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeProviderOrderOverlay(); };
  _renderProvOrderOverlay(overlay);
  document.body.appendChild(overlay);
}

function _renderProvOrderOverlay(overlay) {
  if (!overlay) overlay = document.getElementById('prov-order-overlay');
  if (!overlay || !_provOrderState) return;
  const s = _provOrderState;
  overlay.innerHTML = `<div class="sub-panel">
    <div class="sub-panel-header">
      <span>Provider Priority: ${esc(MODEL_DISPLAY_NAMES[s.model] || s.model)}</span>
      <button onclick="closeProviderOrderOverlay()" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;"><i class="bx bx-x"></i></button>
    </div>
    <div class="sub-panel-list">
      ${s.providers.map((p, i) => {
        const vendor = p.split('-')[0];
        const logo = PROVIDER_LOGOS[vendor] ? '<img src="' + PROVIDER_LOGOS[vendor] + '" style="width:14px;height:14px;border-radius:2px;">' : '';
        return `<div class="sub-panel-item${i === s.selected ? ' selected' : ''}" onclick="_provOrderState.selected=${i};_renderProvOrderOverlay()">${logo} <span style="flex:1">${esc(p)}</span><span style="color:var(--text-3);font-size:10px;">#${i + 1}</span></div>`;
      }).join('')}
    </div>
    <div class="sub-panel-actions">
      <button onclick="_moveProvider(-Infinity)"><i class="bx bx-arrow-to-top"></i> Top</button>
      <button onclick="_moveProvider(-1)"><i class="bx bx-up-arrow-alt"></i> Up</button>
      <button onclick="_moveProvider(1)"><i class="bx bx-down-arrow-alt"></i> Down</button>
      <button onclick="_moveProvider(Infinity)"><i class="bx bx-arrow-to-bottom"></i> Bottom</button>
    </div>
  </div>`;
}

function _moveProvider(dir) {
  const s = _provOrderState;
  if (!s) return;
  const i = s.selected;
  const arr = s.providers;
  if (dir === -Infinity) { const [item] = arr.splice(i, 1); arr.unshift(item); s.selected = 0; }
  else if (dir === Infinity) { const [item] = arr.splice(i, 1); arr.push(item); s.selected = arr.length - 1; }
  else if (dir === -1 && i > 0) { [arr[i], arr[i-1]] = [arr[i-1], arr[i]]; s.selected = i - 1; }
  else if (dir === 1 && i < arr.length - 1) { [arr[i], arr[i+1]] = [arr[i+1], arr[i]]; s.selected = i + 1; }
  _renderProvOrderOverlay();
}

/* openBenchOverlay is defined above near BENCH_SHORT/BENCH_LABELS */

function openPriceOverlay(modelName, e) {
  if (e) e.stopPropagation();
  const models = usageData.models || {};
  const allModels = Object.entries(models).sort((a, b) => {
    const ai = a[1].free_tier ? 0 : (a[1].input_price || 0);
    const bi = b[1].free_tier ? 0 : (b[1].input_price || 0);
    return ai - bi;
  });
  if (allModels.length < 2) return;

  const overlay = document.createElement('div');
  overlay.className = 'sub-overlay';
  overlay.id = 'price-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); } };

  const labels = allModels.map(([k, m]) => MODEL_DISPLAY_NAMES[k] || k);
  const inputPrices = allModels.map(([, m]) => m.free_tier ? 0 : _convertPrice(m.input_price || 0));
  const outputPrices = allModels.map(([, m]) => m.free_tier ? 0 : _convertPrice(m.output_price || 0));
  const hlColors = allModels.map(([k]) => k === modelName ? 0.9 : 0.4);

  overlay.innerHTML = `<div class="sub-panel" style="width:500px;max-height:500px;">
    <div class="sub-panel-header"><span>Price Comparison (${displayCurrency}/1M tokens)</span><button onclick="this.closest('.sub-overlay').remove()" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;"><i class="bx bx-x"></i></button></div>
    <div style="padding:16px;flex:1;"><canvas id="price-chart"></canvas></div>
  </div>`;
  document.body.appendChild(overlay);

  const ctx = document.getElementById('price-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Input', data: inputPrices, backgroundColor: hlColors.map(a => `rgba(74,222,128,${a})`), borderRadius: 4 },
        { label: 'Output', data: outputPrices, backgroundColor: hlColors.map(a => `rgba(251,191,36,${a})`), borderRadius: 4 },
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: 'var(--text-2)', font: { size: 11 } } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'var(--text-3)', font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { color: 'var(--text-2)', font: { size: 11, family: 'Inter' } } }
      }
    }
  });
}

function closeProviderOrderOverlay() {
  const overlay = document.getElementById('prov-order-overlay');
  if (overlay) overlay.remove();
  if (_provOrderState) {
    const models = usageData.models || {};
    if (models[_provOrderState.model]) {
      models[_provOrderState.model].providers = _provOrderState.providers;
    }
    _provOrderState = null;
    renderSettingsTab();
  }
}

async function validateAndSaveKey(btn) {
  const form = btn.closest('.settings-key-form');
  const container = btn.closest('.settings-add-key');
  const vendor = container.dataset.vendor;
  const input = form.querySelector('.settings-key-input');
  const status = form.querySelector('.settings-key-status');
  const key = input.value.trim();
  if (!key) { _setKeyStatus(status, '<span style="color:var(--red)">Enter a key</span>'); return; }
  btn.disabled = true;
  _setKeyStatus(status, '<span style="color:var(--text-3)">Validating...</span>');
  try {
    const res = await fetch('/api/key/validate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({vendor, key}) });
    const data = await res.json();
    if (data.ok) {
      const saveRes = await fetch('/api/key/save', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({vendor, key}) });
      const saveData = await saveRes.json();
      if (saveData.ok) {
        _setKeyStatus(status, '<span style="color:var(--green)"><i class="bx bx-check"></i> Saved</span>');
        input.value = '';
        setTimeout(() => { form.style.display = 'none'; _setKeyStatus(status, ''); fetchUsageData().then(() => renderSettingsTab()); }, 1200);
      } else {
        _setKeyStatus(status, `<span style="color:var(--red)">Save failed: ${esc(saveData.error)}</span>`);
      }
    } else {
      _setKeyStatus(status, `<span style="color:var(--red)"><i class="bx bx-x"></i> ${esc(data.error)}</span>`);
    }
  } catch (e) {
    _setKeyStatus(status, `<span style="color:var(--red)">Network error</span>`);
  }
  btn.disabled = false;
}

async function deleteApiKey(vendor, btn) {
  if (!confirm('Delete this API key?')) return;
  try {
    const res = await fetch('/api/key/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({vendor}) });
    const data = await res.json();
    if (data.ok) {
      fetchUsageData().then(() => renderSettingsTab());
    }
  } catch (e) { console.warn('Delete key failed:', e); }
}

/* ── Sidebar Toggle ── */

/* ── Diff Hunk Actions ── */
window._diffHunkAction = async function(btn, action) {
  const hunk = btn.closest('.diff-hunk');
  if (!hunk || hunk.classList.contains('decided')) return;

  const toolCall = hunk.closest('.tool-call');
  if (!toolCall || toolCall.classList.contains('decided')) return;

  const sid = toolCall.dataset.sid;
  const fname = toolCall.dataset.toolCmd || '';
  const cleanPath = fname.replace(/^(write|edit)\s+/, '');

  if (action === 'accept') {
    hunk.classList.add('accepted', 'decided');
    hunk.querySelectorAll('.diff-hunk-actions').forEach(a => a.remove());

    const allToolCalls = [...document.querySelectorAll('.tool-call[data-tool-type="edit"]')];
    const fileTCs = allToolCalls.filter(tc => {
      const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
      return cmd === cleanPath;
    });
    const myIdx = fileTCs.indexOf(toolCall);
    for (let i = 0; i <= myIdx; i++) {
      const tc = fileTCs[i];
      if (tc.classList.contains('reverted') || tc.classList.contains('decided')) continue;
      tc.classList.add('decided');
      tc.querySelectorAll('.diff-hunk:not(.rejected)').forEach(h => {
        h.classList.add('accepted', 'decided');
        h.querySelectorAll('.diff-hunk-actions').forEach(a => a.remove());
      });
    }
  } else if (action === 'reject') {
    const allToolCalls = [...document.querySelectorAll('.tool-call[data-tool-type="edit"]')];
    const fileTCs = allToolCalls.filter(tc => {
      const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
      return cmd === cleanPath;
    });
    const myIdx = fileTCs.indexOf(toolCall);

    for (let i = fileTCs.length - 1; i >= myIdx; i--) {
      const tc = fileTCs[i];
      if (tc.classList.contains('decided') || tc.classList.contains('reverted')) continue;
      const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
      const hunks = [...tc.querySelectorAll('.diff-hunk:not(.rejected)')].reverse();
      for (const h of hunks) {
        const removed = h.dataset.removed || '';
        const added = h.dataset.added || '';
        try {
          const res = await fetch('/api/revert-hunk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sid, path: cmd, old_text: added, new_text: removed }),
          });
          const data = await res.json();
          if (data.ok) {
            h.classList.add('rejected', 'decided');
            h.querySelectorAll('.diff-line.added, .diff-line.removed').forEach(line => {
              line.classList.remove('added', 'removed');
              line.classList.add('read-line');
            });
            h.querySelectorAll('.diff-hunk-actions').forEach(a => a.remove());
          }
        } catch (e) { console.warn('Revert error:', e); }
      }
      const remaining = tc.querySelectorAll('.diff-hunk:not(.rejected)');
      if (!remaining.length) {
        const statusEl = tc.querySelector('[data-tc=status]');
        if (statusEl) {
          statusEl.className = 'tool-status error';
          statusEl.innerHTML = '<i class="bx bx-x" style="font-size:16px;"></i>';
        }
        const stats = tc.querySelector('[data-tc=diffstats]');
        if (stats) stats.innerHTML = '<span style="color:var(--text-3);font-style:italic">' + _('reverted') + '</span>';
        tc.classList.add('reverted', 'decided');
      }
    }
  }
};

window._acceptFile = function(btn) {
  const item = btn.closest('.file-summary-item');
  if (!item || item.classList.contains('accepted') || item.classList.contains('rejected')) return;
  item.classList.add('accepted');
  const actions = item.querySelector('.file-item-actions');
  if (actions && !actions.querySelector('.file-result-icon')) {
    actions.insertAdjacentHTML('beforeend', '<i class="bx bx-check file-result-icon accept-icon"></i>');
  }

  const filePath = item.dataset.path;
  if (filePath) {
    const allToolCalls = [...document.querySelectorAll('.tool-call[data-tool-type="edit"]')];
    for (const tc of allToolCalls) {
      const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
      if (cmd !== filePath) continue;
      if (tc.classList.contains('reverted') || tc.classList.contains('decided')) continue;
      tc.classList.add('decided');
      tc.querySelectorAll('.diff-hunk:not(.rejected)').forEach(h => h.classList.add('accepted'));
      tc.querySelectorAll('.diff-hunk-actions').forEach(a => a.remove());
    }
  }
};

window._scheduleFileRemoval = function(item) {
  setTimeout(() => {
    item.classList.add('removing');
    setTimeout(() => {
      const path = item.dataset.path || '';
      item.remove();
      if (path && typeof engine !== 'undefined') {
        delete engine._taskFiles[path];
      }
      window._checkFileBarEmpty();
    }, 300);
  }, 2000);
};

window._checkFileBarEmpty = function() {
  if (typeof engine === 'undefined' || !engine._taskFileBarEl) return;
  const remaining = engine._taskFileBarEl.querySelectorAll('.file-summary-item:not(.removing)');
  if (!remaining.length) {
    engine._taskFileBarEl.classList.add('removing');
    setTimeout(() => engine._removeTaskFileBar(), 300);
  } else {
    const count = remaining.length;
    const header = engine._taskFileBarEl.querySelector('.file-summary-header span');
    if (header) header.textContent = count + ' File' + (count > 1 ? 's' : '');
  }
};

window._revertFile = async function(btn) {
  const filePath = btn.dataset.path;
  if (!filePath) return;
  const item = btn.closest('.file-summary-item');

  const allToolCalls = [...document.querySelectorAll('.tool-call[data-tool-type="edit"]')];
  const fileTCs = allToolCalls.filter(tc => {
    const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
    return cmd === filePath;
  });

  let reverted = 0, failed = 0;
  const reverseFileTCs = [...fileTCs].reverse();
  for (const tc of reverseFileTCs) {
    if (tc.classList.contains('decided') || tc.classList.contains('reverted')) continue;
    const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
    const hunks = [...tc.querySelectorAll('.diff-hunk:not(.rejected)')].reverse();
    for (const hunk of hunks) {
      const removed = hunk.dataset.removed || '';
      const added = hunk.dataset.added || '';
      const sid = tc.dataset.sid;
      try {
        const res = await fetch('/api/revert-hunk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sid, path: cmd, old_text: added, new_text: removed }),
        });
        const data = await res.json();
        if (data.ok) { hunk.classList.add('rejected'); reverted++; }
        else { failed++; console.warn('Revert failed for hunk:', data.error); }
      } catch (e) { failed++; console.warn('Revert error:', e); }
    }
    if (!failed) {
      const statusEl = tc.querySelector('[data-tc=status]');
      if (statusEl) {
        statusEl.className = 'tool-status error';
        statusEl.innerHTML = '<i class="bx bx-x" style="font-size:16px;"></i>';
      }
      const stats = tc.querySelector('[data-tc=diffstats]');
      if (stats) stats.innerHTML = '<span style="color:var(--text-3);font-style:italic">' + _('reverted') + '</span>';
      tc.classList.add('reverted', 'decided');
      tc.querySelectorAll('.diff-line.added, .diff-line.removed').forEach(line => {
        line.classList.remove('added', 'removed');
        line.classList.add('read-line');
      });
      tc.querySelectorAll('.diff-hunk-actions').forEach(a => a.remove());
    }
  }
  if (item && !failed) {
    item.classList.add('rejected');
    const actions = item.querySelector('.file-item-actions');
    if (actions && !actions.querySelector('.file-result-icon')) {
      actions.insertAdjacentHTML('beforeend', '<i class="bx bx-x file-result-icon reject-icon"></i>');
    }
  }
};

/* ── SSE Connection ── */
function connectSSE() {
  const source = new EventSource('/api/events');

  source.onmessage = function(e) {
    try {
      const evt = JSON.parse(e.data);
      handleSSEEvent(evt);
    } catch (err) {
      console.warn('SSE parse error:', err);
    }
  };

  source.onerror = function() {
    console.warn('SSE connection lost, will check server health...');
    source.close();
    _checkServerHealth();
  };
}

let _serverWasDown = false;
function _checkServerHealth() {
  fetch('/api/sessions').then(r => {
    if (r.ok && _serverWasDown) {
      console.log('Server is back — reloading page');
      location.reload();
    } else {
      _serverWasDown = false;
      syncSessions();
      setTimeout(connectSSE, 2000);
    }
  }).catch(() => {
    _serverWasDown = true;
    setTimeout(_checkServerHealth, 3000);
  });
}

function syncSessions() {
  fetch('/api/sessions').then(r => r.json()).then(data => {
    if (!data.ok || !data.sessions) return;
    const backendIds = new Set();
    data.sessions.forEach(s => {
      backendIds.add(s.id);
      const existing = engine.getSession(s.id);
      if (!existing) {
        engine.addSession(s.id, s.title, s.status, s.mode || 'agent');
      } else {
        if (existing.status !== s.status) engine.setSessionStatus(s.id, s.status);
        if (existing.title !== s.title) engine.renameSession(s.id, s.title);
      }
    });
    Object.keys(engine.sessions).forEach(id => {
      if (!backendIds.has(id)) engine.deleteSession(id);
    });
    if (!activeSessionId && data.sessions.length > 0) {
      const first = data.sessions[0];
      activeSessionId = first.id;
      engine.activeSessionId = first.id;
      engine._refreshSessions();
      $('main-title').textContent = first.title || 'New Task';
      apiActivateSession(first.id);
    }
  }).catch(() => {});
}
setInterval(syncSessions, 10000);

function handleSSEEvent(evt) {
  const welcome = $('welcome');
  if (welcome) welcome.remove();

  // Debug blocks are now inserted by the engine via setDebugMode(),
  // positioned immediately before each rendered block.
  switch (evt.type) {
    case 'session_created':
      if (!engine.getSession(evt.id)) {
        engine.addSession(evt.id, evt.title || 'New Task', 'idle', evt.mode || 'agent');
      }
      activeSessionId = evt.id;
      engine.activeSessionId = evt.id;
      engine.clearAllTrackers();
      engine._refreshSessions();
      $('main-title').textContent = evt.title || 'New Task';
      if (evt.self_operate) engine._selfOperate = true;
      apiActivateSession(evt.id).then(() => {
        if (engine._selfOperate) {
          $('input').disabled = true;
          $('input').placeholder = 'Self-operate mode \u2014 awaiting response via CLI...';
          _autoResizeInput();
          $('btn-send').disabled = true;
          setStopMode(true);
        }
      });
      { const m = evt.mode || 'agent';
        if (m !== currentMode) {
          currentMode = m;
          if (modePill && modePill.setValue) modePill.setValue(m);
        }
      }
      break;

    case 'session_renamed':
      engine.renameSession(evt.id, evt.title);
      if (evt.id === activeSessionId) {
        $('main-title').textContent = evt.title;
      }
      break;

    case 'session_deleted':
      engine.deleteSession(evt.id);
      if (!engine.activeSessionId) {
        activeSessionId = null;
        $('main-title').textContent = 'New Task';
        $('chat-area').innerHTML = '<div id="welcome" class="welcome"><p>Type a message to start</p></div>';
        $('input').disabled = false;
        $('input').placeholder = 'Type a message...';
        _autoResizeInput();
        $('btn-send').disabled = false;
        setStopMode(false);
      }
      break;

    case 'settings_changed':
      fetchUsageData().then(() => { if (settingsTab) renderSettingsTab(); });
      break;

    case 'session_status':
      engine.setSessionStatus(evt.id, evt.status);
      if (evt.id === activeSessionId) {
        if (evt.status === 'done' || evt.status === 'idle') {
          sending = false;
          $('input').focus();
          setStopMode(false);
        } else if (evt.status === 'running') {
          setStopMode(true);
        }
      }
      break;

    case 'inject_input': {
      const input = $('input');
      const text = evt.text || '';
      input.value = '';
      input.disabled = false;
      let i = 0;
      const typeInterval = setInterval(() => {
        if (i < text.length) {
          input.value += text[i];
          i++;
        } else {
          clearInterval(typeInterval);
          setTimeout(() => sendMessage(), 200);
        }
      }, 30);
      break;
    }

    case 'model_switched': {
      const toDisplay = MODEL_DISPLAY_NAMES[evt.to] || evt.to;
      const logo = MODEL_LOGOS[evt.to] || resolveModelLogo(evt.to);
      const logoHtml = logo ? `<img src="${logo}" alt="">` : `<i class="bx bx-bot"></i>`;
      engine.renderCenterNotice(`${logoHtml} Switched to <strong>${esc(toDisplay)}</strong>`);
      if (modelPill) modelPill.setValue(evt.to);
      break;
    }

    case 'error': {
      const errMsg = evt.message || 'Unknown error';
      engine.renderCenterNotice(`<i class="bx bx-x-circle" style="color:var(--red);font-size:16px;vertical-align:middle;"></i> <strong style="color:var(--red);">Error</strong>: ${esc(errMsg)}`);
      $('input').disabled = false;
      $('btn-send').disabled = false;
      sending = false;
      setStopMode(false);
      if (activeSessionId) engine.setSessionStatus(activeSessionId, 'done');
      break;
    }

    default:
      if (evt.session_id && evt.session_id !== activeSessionId) break;
      if (evt.type === 'user' && evt.session_id) {
        if (engine._localUserPending) { engine._localUserPending = false; break; }
      }
      if (evt.type === 'llm_request' && evt.self_operate) {
        $('input').disabled = true;
        $('input').placeholder = 'Self-operate mode — awaiting response via CLI...';
        _autoResizeInput();
        $('btn-send').disabled = true;
      }
      if (evt.type === 'complete') {
        sending = false;
        $('input').disabled = false;
        $('input').placeholder = _('Type a message. Ctrl+Enter to send.');
        _autoResizeInput();
        $('btn-send').disabled = false;
        setStopMode(false);
        const reason = evt.reason || 'done';
        if (activeSessionId) engine.setSessionStatus(activeSessionId, 'done');
      }
      engine.enqueueEvent(evt);
      break;
  }
}

/* ── Init ── */
async function init() {
  let initialSessionId = null;
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    if (data.ok && data.sessions) {
      let runningId = null;
      data.sessions.forEach(s => {
        engine.addSession(s.id, s.title, s.status, s.mode || 'agent');
        if (s.status === 'running') runningId = s.id;
        if (!initialSessionId) initialSessionId = s.id;
      });
      if (runningId) initialSessionId = runningId;
      const initSession = data.sessions.find(s => s.id === (runningId || initialSessionId));
      if (initSession && initSession.mode && initSession.mode !== currentMode) {
        currentMode = initSession.mode;
        if (modePill && modePill.setValue) modePill.setValue(initSession.mode);
      }
    }
  } catch (err) {
    console.warn('Failed to load sessions:', err);
  }

  try {
    const cfgResp = await fetch('/api/model/list');
    const cfgData = await cfgResp.json();
    if (cfgData.ok && cfgData.models && cfgData.models.length > 1) {
      MODEL_OPTIONS = cfgData.models.map(m => ({ value: m.value, label: m.label }));
      const newOpts = MODEL_OPTIONS.map(m => m.value === 'auto' ? { value: 'auto', label: _('Auto'), icon: 'bx-bot' } : { value: m.value, label: m.label, ...(MODEL_LOGOS[m.value] ? { logo: MODEL_LOGOS[m.value] } : { icon: 'bx-bot' }) });
      modelPill.setOptions(newOpts);
    }
  } catch (e) { console.warn('Failed to load configured models:', e); }

  try {
    const scfg = await fetch('/api/session_config').then(r => r.json());
    if (scfg.ok && scfg.config) {
      const c = scfg.config;
      if (c.default_turn_limit && !localStorage.getItem('default_turn_limit')) {
        currentTurnLimit = c.default_turn_limit;
        const sel = document.getElementById('turn-limit-select');
        if (sel) sel.value = String(c.default_turn_limit);
      }
    }
  } catch (e) { console.warn('Failed to load session config:', e); }

  if (initialSessionId) {
    activeSessionId = initialSessionId;
    engine.activeSessionId = initialSessionId;
    engine._refreshSessions();
    $('main-title').textContent = engine.sessions[initialSessionId]?.title || 'New Task';
    await apiActivateSession(initialSessionId);
  } else {
    $('main-title').textContent = 'New Task';
    $('chat-area').innerHTML = '<div id="welcome" class="welcome"><p>Type a message to start</p></div>';
  }

  connectSSE();
  _autoResizeInput();

  const chatArea = $('chat-area');
  chatArea.addEventListener('scroll', () => {
    if (chatArea.scrollTop <= 0 && _pendingOlderEvents.length > 0) {
      loadOlderEvents();
    }
    _updateFloatPanel();
    _userScrolledAt = Date.now();
  });

  $('input').focus();

  setInterval(() => {
    const rawIdle = localStorage.getItem('auto_scroll_idle_s');
    const idleS = rawIdle === 'none' ? 0 : (parseInt(rawIdle) || 30);
    if (idleS <= 0) return;
    const chat = $('chat-area');
    if (!chat) return;
    const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80;
    if (atBottom) return;
    const idleMs = Date.now() - _userScrolledAt;
    if (idleMs >= idleS * 1000) {
      chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    }
  }, 5000);
}

init();
