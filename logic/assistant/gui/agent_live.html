  if (actions && !actions.querySelector('.file-result-icon')) {
    actions.insertAdjacentHTML('beforeend', '<i class="bx bx-check file-result-icon accept-icon"></i>');
  }
  window._scheduleFileRemoval(item);
};

window._scheduleFileRemoval = function(item) {
  setTimeout(() => {
    item.classList.add('removing');
    setTimeout(() => {
      const path = item.dataset.path || '';
      item.remove();
      if (path && typeof engine !== 'undefined') {
        delete engine._taskFiles[path];
      }
      window._checkFileBarEmpty();
    }, 300);
  }, 2000);
};

window._checkFileBarEmpty = function() {
  if (typeof engine === 'undefined' || !engine._taskFileBarEl) return;
  const remaining = engine._taskFileBarEl.querySelectorAll('.file-summary-item:not(.removing)');
  if (!remaining.length) {
    engine._taskFileBarEl.classList.add('removing');
    setTimeout(() => engine._removeTaskFileBar(), 300);
  } else {
    const count = remaining.length;
    const header = engine._taskFileBarEl.querySelector('.file-summary-header span');
    if (header) header.textContent = count + ' File' + (count > 1 ? 's' : '');
  }
};

window._revertFile = async function(btn) {
  const filePath = btn.dataset.path;
  if (!filePath) return;
  const item = btn.closest('.file-summary-item');

  const toolCalls = document.querySelectorAll('.tool-call[data-tool-type="edit"]');
  let reverted = 0, failed = 0;
  for (const tc of toolCalls) {
    const cmd = (tc.dataset.toolCmd || '').replace(/^(write|edit)\s+/, '');
    if (cmd !== filePath) continue;
    const hunks = tc.querySelectorAll('.diff-hunk:not(.rejected)');
    for (const hunk of hunks) {
      const removed = hunk.dataset.removed || '';
      const added = hunk.dataset.added || '';
      const sid = tc.dataset.sid;
      try {
        const res = await fetch('/api/revert-hunk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sid, path: cmd, old_text: added, new_text: removed }),
        });
        const data = await res.json();
        if (data.ok) { hunk.classList.add('rejected'); reverted++; }
        else { failed++; console.warn('Revert failed for hunk:', data.error); }
      } catch (e) { failed++; console.warn('Revert error:', e); }
    }
    if (!failed) {
      const statusEl = tc.querySelector('[data-tc=status]');
      if (statusEl) {
        statusEl.className = 'tool-status error';
        statusEl.innerHTML = '<i class="bx bx-x" style="font-size:16px;"></i>';
      }
      const stats = tc.querySelector('[data-tc=diffstats]');
      if (stats) stats.innerHTML = '<span style="color:var(--text-3);font-style:italic">' + _('reverted') + '</span>';
      tc.classList.add('reverted');
      tc.querySelectorAll('.diff-line.added, .diff-line.removed').forEach(line => {
        line.classList.remove('added', 'removed');
        line.classList.add('read-line');
      });
    }
  }
  if (item && !failed) {
    item.classList.add('rejected');
    const actions = item.querySelector('.file-item-actions');
    if (actions && !actions.querySelector('.file-result-icon')) {
      actions.insertAdjacentHTML('beforeend', '<i class="bx bx-x file-result-icon reject-icon"></i>');
    }
    window._scheduleFileRemoval(item);
  }
};

/* ── SSE Connection ── */
function connectSSE() {
  const source = new EventSource('/api/events');

  source.onmessage = function(e) {
    try {
      const evt = JSON.parse(e.data);
      handleSSEEvent(evt);
    } catch (err) {
      console.warn('SSE parse error:', err);
    }
  };

  source.onerror = function() {
    console.warn('SSE connection lost, will check server health...');
    source.close();
    _checkServerHealth();
  };
}

let _serverWasDown = false;
function _checkServerHealth() {
  fetch('/api/sessions').then(r => {
    if (r.ok && _serverWasDown) {
      console.log('Server is back — reloading page');
      location.reload();
    } else {
      _serverWasDown = false;
      syncSessions();
      setTimeout(connectSSE, 2000);
    }
  }).catch(() => {
    _serverWasDown = true;
    setTimeout(_checkServerHealth, 3000);
  });
}

function syncSessions() {
  fetch('/api/sessions').then(r => r.json()).then(data => {
    if (!data.ok || !data.sessions) return;
    const backendIds = new Set();
    data.sessions.forEach(s => {
      backendIds.add(s.id);
      const existing = engine.getSession(s.id);
      if (!existing) {
        engine.addSession(s.id, s.title, s.status, s.mode || 'agent');
      } else {
        if (existing.status !== s.status) engine.setSessionStatus(s.id, s.status);
        if (existing.title !== s.title) engine.renameSession(s.id, s.title);
      }
    });
    Object.keys(engine.sessions).forEach(id => {
      if (!backendIds.has(id)) engine.deleteSession(id);
    });
  }).catch(() => {});
}
setInterval(syncSessions, 10000);

function handleSSEEvent(evt) {
  const welcome = $('welcome');
  if (welcome) welcome.remove();

  // Debug blocks are now inserted by the engine via setDebugMode(),
  // positioned immediately before each rendered block.
  switch (evt.type) {
    case 'session_created':
      if (!engine.getSession(evt.id)) {
        engine.addSession(evt.id, evt.title || 'New Task', 'idle', evt.mode || 'agent');
      }
      engine.setActiveSession(evt.id);
      activeSessionId = evt.id;
      { const m = evt.mode || 'agent';
        if (m !== currentMode) {
          currentMode = m;
          if (modePill && modePill.setValue) modePill.setValue(m);
        }
      }
      break;

    case 'session_renamed':
      engine.renameSession(evt.id, evt.title);
      if (evt.id === activeSessionId) {
        $('main-title').textContent = evt.title;
      }
      break;

    case 'session_deleted':
      engine.deleteSession(evt.id);
      break;

    case 'settings_changed':
      fetchUsageData().then(() => { if (settingsTab) renderSettingsTab(); });
      break;

    case 'session_status':
      engine.setSessionStatus(evt.id, evt.status);
      if (evt.id === activeSessionId) {
        if (evt.status === 'done' || evt.status === 'idle') {
          sending = false;
          $('input').focus();
          setStopMode(false);
        } else if (evt.status === 'running') {
          setStopMode(true);
        }
      }
      break;

    case 'inject_input': {
      const input = $('input');
      const text = evt.text || '';
      input.value = '';
      input.disabled = false;
      let i = 0;
      const typeInterval = setInterval(() => {
        if (i < text.length) {
          input.value += text[i];
          i++;
        } else {
          clearInterval(typeInterval);
          setTimeout(() => sendMessage(), 200);
        }
      }, 30);
      break;
    }

    case 'model_switched': {
      const toDisplay = MODEL_DISPLAY_NAMES[evt.to] || evt.to;
      const logo = MODEL_LOGOS[evt.to] || ZHIPU_LOGO;
      engine.renderCenterNotice(`<img src="${logo}" alt=""> Switched to <strong>${esc(toDisplay)}</strong>`);
      if (modelPill) modelPill.setValue(evt.to);
      break;
    }

    case 'error': {
      const errMsg = evt.message || 'Unknown error';
      engine.renderCenterNotice(`<i class="bx bx-x-circle" style="color:var(--red);font-size:16px;vertical-align:middle;"></i> <strong style="color:var(--red);">Error</strong>: ${esc(errMsg)}`);
      $('input').disabled = false;
      $('btn-send').disabled = false;
      sending = false;
      setStopMode(false);
      if (activeSessionId) engine.setSessionStatus(activeSessionId, 'idle');
      break;
    }

    default:
      if (evt.session_id && evt.session_id !== activeSessionId) break;
      if (evt.type === 'user' && evt.session_id) break;
      if (evt.type === 'llm_request' && evt.self_operate) {
        $('input').disabled = true;
        $('input').placeholder = 'Self-operate mode — awaiting response via CLI...';
        $('btn-send').disabled = true;
      }
      if (evt.type === 'complete') {
        sending = false;
        $('input').disabled = false;
        $('input').placeholder = _('Type a message. Ctrl+Enter to send.');
        $('btn-send').disabled = false;
        setStopMode(false);
        const reason = evt.reason || 'done';
        if (activeSessionId) engine.setSessionStatus(activeSessionId, reason === 'error' ? 'idle' : 'done');
      }
      engine.enqueueEvent(evt);
      break;
  }
}

/* ── Init ── */
async function init() {
  let initialSessionId = null;
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    if (data.ok && data.sessions) {
      let runningId = null;
      data.sessions.forEach(s => {
        engine.addSession(s.id, s.title, s.status, s.mode || 'agent');
        if (s.status === 'running') runningId = s.id;
        if (!initialSessionId) initialSessionId = s.id;
      });
      if (runningId) initialSessionId = runningId;
      const initSession = data.sessions.find(s => s.id === (runningId || initialSessionId));
      if (initSession && initSession.mode && initSession.mode !== currentMode) {
        currentMode = initSession.mode;
        if (modePill && modePill.setValue) modePill.setValue(initSession.mode);
      }
    }
  } catch (err) {
    console.warn('Failed to load sessions:', err);
  }

  try {
    const cfgResp = await fetch('/api/configured_models');
    const cfgData = await cfgResp.json();
    if (cfgData.ok && cfgData.models && cfgData.models.length > 1) {
      const newOpts = cfgData.models.map(m => ({
        value: m.value, label: m.label, logo: MODEL_LOGOS[m.value] || ZHIPU_LOGO
      }));
      modelPill.setOptions(newOpts);
    }
  } catch (e) { console.warn('Failed to load configured models:', e); }

  try {
    const scfg = await fetch('/api/session_config').then(r => r.json());
    if (scfg.ok && scfg.config) {
      const c = scfg.config;
      if (c.default_turn_limit && !localStorage.getItem('default_turn_limit')) {
        currentTurnLimit = c.default_turn_limit;
        const sel = document.getElementById('turn-limit-select');
        if (sel) sel.value = String(c.default_turn_limit);
      }
    }
  } catch (e) { console.warn('Failed to load session config:', e); }

  if (initialSessionId) {
    activeSessionId = initialSessionId;
    engine.activeSessionId = initialSessionId;
    engine._refreshSessions();
    $('main-title').textContent = engine.sessions[initialSessionId]?.title || 'New Task';
    await apiActivateSession(initialSessionId);
  }

  connectSSE();

  const chatArea = $('chat-area');
  chatArea.addEventListener('scroll', () => {
    if (chatArea.scrollTop <= 0 && _pendingOlderEvents.length > 0) {
      loadOlderEvents();
    }
  });

  $('input').focus();
}

init();
</script>
