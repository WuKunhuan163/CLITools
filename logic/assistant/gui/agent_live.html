<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant - Live</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-2: #232733;
  --surface-3: #2d3140;
  --border: #2d3140;
  --border-active: #3d4255;
  --text: #e4e6ed;
  --text-2: #9296ab;
  --text-3: #6b7088;
  --accent: #5b8def;
  --accent-dim: rgba(91,141,239,0.12);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.10);
  --orange: #fbbf24;
  --orange-dim: rgba(251,191,36,0.10);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.10);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.08);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  font-variant-ligatures: none;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
  --transition: 150ms ease;
}
body.light-mode {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface-2: #eef0f4;
  --surface-3: #e2e5eb;
  --border: #d4d8e0;
  --border-active: #b8bcc8;
  --text: #1a1d27;
  --text-2: #555a6e;
  --text-3: #8b8fa3;
  --accent: #3a6fd8;
  --accent-dim: rgba(58,111,216,0.10);
  --green: #16a34a;
  --green-dim: rgba(22,163,74,0.08);
  --orange: #d97706;
  --orange-dim: rgba(217,119,6,0.08);
  --red: #dc2626;
  --red-dim: rgba(220,38,38,0.08);
  --purple: #7c3aed;
  --purple-dim: rgba(124,58,237,0.06);
}
body.brilliant-mode {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface-2: #1e2640;
  --surface-3: #283350;
  --border: #2d3a5c;
  --border-active: #4a5a8a;
  --text: #e8ecf7;
  --text-2: #9ca8c8;
  --text-3: #6b7aa0;
  --accent: #6c5ce7;
  --accent-dim: rgba(108,92,231,0.18);
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.12);
  --orange: #ffab00;
  --orange-dim: rgba(255,171,0,0.12);
  --red: #ff5252;
  --red-dim: rgba(255,82,82,0.12);
  --purple: #b388ff;
  --purple-dim: rgba(179,136,255,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; user-select: none; -webkit-user-select: none; }
.messages, .messages *, .input-field, textarea, input[type="text"], pre, code, .msg-text, .tool-result-content { user-select: text; -webkit-user-select: text; }

/* ── Sidebar ── */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.2s ease, min-width 0.2s ease; position: relative; }
.sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; border-right: none; }
.sidebar-toggle { position: absolute; right: -14px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 10; transition: all 0.2s ease; }
.sidebar-toggle:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.sidebar.collapsed .sidebar-toggle { right: -32px; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-header h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); display: flex; align-items: center; gap: 10px; }
.sidebar-logo { width: 26px; height: 26px; border-radius: 7px; background: var(--accent-dim); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.btn-new { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.btn-new:hover { border-color: var(--text-2); color: var(--text-2); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 2px; font-size: 13px; color: var(--text-2); position: relative; }
.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active { background: var(--accent-dim); color: var(--text); }
.session-dot { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.session-dot.idle { color: var(--text-3); }
.session-dot.running { color: var(--green); }
.session-dot.done { color: var(--green); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-3); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.main-header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; min-height: 48px; flex-shrink: 0; }
.main-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }

/* ── Settings Button ── */
.btn-settings { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-2); cursor: pointer; font-size: 12px; font-family: var(--font); font-weight: 500; transition: all var(--transition); flex-shrink: 0; }
.btn-settings:hover { border-color: var(--text-3); color: var(--text); background: rgba(255,255,255,0.03); }
.btn-settings i { font-size: 15px; }

/* ── Settings Overlay ── */
.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; display: none; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
.settings-overlay.open { display: flex; }
.settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 860px; max-width: 92vw; height: 580px; max-height: 85vh; box-shadow: 0 12px 48px rgba(0,0,0,0.5); display: flex; overflow: hidden; }
.settings-sidebar { width: 180px; border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; display: flex; flex-direction: column; }
.settings-sidebar-title { font-size: 13px; font-weight: 700; padding: 0 16px 12px; color: var(--text); letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px; }
.settings-tab { padding: 9px 16px; font-size: 13px; cursor: pointer; color: var(--text-2); display: flex; align-items: center; gap: 8px; transition: all var(--transition); }
.settings-tab:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.settings-tab.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; border-right: 2px solid var(--accent); }
.settings-tab i { font-size: 16px; }
.settings-content { flex: 1; overflow-y: auto; padding: 20px 24px; min-width: 0; }
.settings-close { border: none; background: none; color: var(--text-3); cursor: pointer; font-size: 18px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
.settings-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }

/* ── Settings Section Styles ── */
.settings-section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.settings-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.settings-card.configured { background: color-mix(in srgb, var(--green) 8%, var(--surface-2)); border-color: color-mix(in srgb, var(--green) 30%, var(--border)); }
.settings-card.unconfigured { }
.settings-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.settings-card-title img { width: 18px; height: 18px; border-radius: 3px; }
.settings-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.settings-badge.free { background: var(--green-dim); color: var(--green); }
.settings-badge.paid { background: var(--orange-dim); color: var(--orange); }
.settings-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
.settings-stat { text-align: center; }
.settings-stat-value { font-size: 18px; font-weight: 700; color: var(--text); font-family: var(--mono); }
.settings-stat-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.settings-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.settings-table th { text-align: left; font-weight: 600; color: var(--text-2); padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
.settings-table td { padding: 5px 8px; color: var(--text-2); border-bottom: 1px solid rgba(255,255,255,0.03); font-family: var(--mono); font-size: 11.5px; }
.settings-table tr:hover td { background: rgba(255,255,255,0.02); }
.settings-table .td-ok { color: var(--green); }
.settings-table .td-err { color: var(--red); }
.settings-provider-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.settings-provider-chip { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: var(--surface-3); color: var(--text-2); display: flex; align-items: center; gap: 4px; cursor: grab; }
.settings-provider-chip .drag-handle { color: var(--text-3); font-size: 10px; }
.settings-key-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; font-family: var(--mono); color: var(--text-2); }
.settings-key-mask { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.settings-key-delete { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 13px; line-height: 1; opacity: 0; transition: all var(--transition); }
.settings-key-row:hover .settings-key-delete { opacity: 1; }
.settings-key-delete:hover { color: var(--red); background: var(--red-dim); }
.settings-key-label { font-size: 10px; color: var(--text-3); font-family: var(--font); }
.settings-empty { text-align: center; padding: 30px; color: var(--text-3); font-size: 13px; }
.settings-add-key { margin-top: 6px; }
.settings-add-key-btn { background: none; border: 1px dashed var(--border); color: var(--text-3); font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
.settings-add-key-btn:hover { border-color: var(--accent); color: var(--accent); }
.sub-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 3000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
.sub-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 360px; max-height: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; }
.sub-panel-header { padding: 12px 16px; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sub-panel-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.sub-panel-item { padding: 8px 16px; font-size: 12px; display: flex; align-items: center; gap: 8px; background: var(--surface); border-bottom: 1px solid var(--border); }
.sub-panel-item.selected { background: var(--accent-dim); }
.sub-panel-actions { padding: 8px; border-top: 1px solid var(--border); display: flex; gap: 4px; justify-content: center; }
.sub-panel-actions button { background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text-2); font-size: 11px; padding: 4px 10px; cursor: pointer; }
.sub-panel-actions button:hover { border-color: var(--accent); color: var(--accent); }
.sub-panel-search { padding: 6px 12px; border-bottom: 1px solid var(--border); }
.sub-panel-search input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; color: var(--text); font-size: 11px; font-family: var(--font); outline: none; }
.sub-panel-search input:focus { border-color: var(--accent); }
.settings-key-form { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.settings-key-form-row { display: flex; align-items: center; gap: 6px; }
.settings-key-input { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; font-size: 12px; font-family: var(--mono); color: var(--text-1); outline: none; }
.settings-key-input:focus { border-color: var(--accent); }
.settings-validate-btn { background: color-mix(in srgb, var(--green) 85%, #000); color: #fff; border: none; border-radius: 4px; padding: 5px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.settings-validate-btn:hover { opacity: 0.9; }
.settings-validate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.settings-key-status { font-size: 11px; display: none; word-break: break-word; max-width: 100%; line-height: 1.5; padding: 4px 0; }

/* ── Pinned Panels ── */
.pinned-panels { margin: 0 24px; flex-shrink: 0; display: flex; flex-direction: column; gap: 0; }
.pinned-panel { background: var(--surface); border: 1px solid var(--border); border-top: none; padding: 10px 14px; animation: slideDown 0.25s ease; }
.pinned-panel:first-child { border-top: 1px solid var(--border); }
.pinned-panel:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
.pinned-panel:only-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.pinned-header { font-size: 11px; font-weight: 600; color: var(--text-2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.pinned-header i { font-size: 14px; }
.pinned-chevron { margin-left: auto; font-size: 14px; transition: transform 0.2s ease; display: flex; align-items: center; }
.pinned-panel.collapsed .pinned-chevron { transform: rotate(-90deg); }
.pinned-panel.collapsed .pinned-list { display: none; }
.pinned-panel.collapsed { padding-bottom: 10px; }
.pinned-panel.collapsed .pinned-header { margin-bottom: 0; }
.pinned-list { list-style: none; max-height: 160px; overflow-y: auto; position: relative; }
.pinned-list::-webkit-scrollbar { width: 4px; }
.pinned-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.pinned-panel.overflow::after { content: ''; display: block; height: 20px; background: linear-gradient(transparent, var(--surface)); position: sticky; bottom: 0; margin-top: -20px; pointer-events: none; }

/* ── Tracker items ── */
.tracker-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12.5px; font-family: var(--mono); color: var(--text-2); }
.tracker-item .tracker-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tracker-item .tracker-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tracker-item .tracker-time { font-size: 10px; color: var(--text-3); flex-shrink: 0; }
.tracker-item.running .tracker-icon { color: var(--accent); }
.tracker-item.done .tracker-icon { color: var(--green); }
.tracker-item.failed .tracker-icon { color: var(--red); }

/* ── Todo items ── */
.todo-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; transition: all 0.2s ease; }
.todo-check { width: 16px; height: 16px; border: 1.5px solid var(--border-active); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
.todo-item.completed .todo-check { background: var(--green); border-color: var(--green); }
.todo-item.completed .todo-check::after { content: '✓'; font-size: 10px; color: #0f1117; font-weight: 700; }
.todo-item.completed .todo-text { color: var(--text-3); text-decoration: line-through; }
.todo-item.in_progress .todo-check { border-color: var(--accent); }
.todo-item.in_progress .todo-check::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.todo-text { flex: 1; color: var(--text); }
.todo-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; font-family: var(--mono); }
.todo-badge.pending { background: var(--surface-3); color: var(--text-3); }
.todo-badge.in_progress { background: var(--accent-dim); color: var(--accent); }
.todo-badge.completed { background: var(--green-dim); color: var(--green); }
.todo-item .todo-delete { opacity: 0; border: none; background: none; color: var(--text-3); cursor: pointer; font-size: 14px; padding: 0 2px; transition: opacity 0.15s; }
.todo-item:hover .todo-delete { opacity: 1; }
.todo-item .todo-delete:hover { color: var(--red); }

/* ── Messages ── */
.messages { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 24px 28px; display: flex; flex-direction: column; gap: 0; }
.messages > * { flex-shrink: 0; }
.msg-group { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.msg-user { align-self: flex-end; max-width: 65%; background: var(--accent); color: white; padding: 10px 16px; border-radius: 18px 18px 4px 18px; font-size: 14px; line-height: 1.55; margin-bottom: 8px; word-break: break-word; overflow-wrap: break-word; }
.msg-text { padding: 12px 0 4px 0; font-size: 14px; line-height: 1.7; color: var(--text); max-width: 90%; word-break: break-word; overflow-wrap: break-word; }
.msg-text .md-h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; color: var(--text); line-height: 1.3; }
.msg-text .md-h2 { font-size: 17px; font-weight: 600; margin: 14px 0 6px; color: var(--text); line-height: 1.3; }
.msg-text .md-h3 { font-size: 15px; font-weight: 600; margin: 12px 0 4px; color: var(--text-2); line-height: 1.3; }
.msg-text .md-list { margin: 4px 0 4px 20px; padding: 0; }
.msg-text .md-list li { margin: 2px 0; }
.msg-text .md-inline-code { background: var(--surface-3); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 12px; }
.msg-text .md-hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.msg-text .md-codeblock { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin: 8px 0; overflow-x: auto; }
.msg-text .md-codeblock code { font-family: var(--mono); font-size: 12px; color: var(--text); white-space: pre; }
.turn-spacer { height: 6px; }

/* ── Thinking ── */
.think-body-content { padding: 10px 14px; font-size: 12.5px; line-height: 1.6; color: var(--text-2); white-space: pre-wrap; }
.think-cursor { display: inline-block; width: 2px; height: 14px; background: var(--text-2); animation: blink 0.8s infinite; vertical-align: text-bottom; margin-left: 1px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.thought-block { margin: 4px 0; }
.thought-header { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 0; user-select: none; }
.thought-label { font-size: 14px; font-weight: 500; color: var(--text-2); }
.thought-duration { font-size: 13px; color: var(--text-3); }
.thought-chevron { font-size: 16px; color: var(--text-3); transition: transform 0.2s; }
.thought-block.expanded .thought-chevron { transform: rotate(180deg); }
.thought-body { display: none; padding: 8px 0; font-size: 13px; line-height: 1.6; color: var(--text-2); white-space: pre-wrap; }
.thought-block.expanded .thought-body { display: block; }
.spinner.think-spinner { border-top-color: var(--purple); }

/* ── Diff rendering ── */
.diff-view { font-family: var(--mono); font-size: 12px; line-height: 1.7; padding: 0; font-variant-ligatures: none; }
.diff-line { padding: 0 14px; white-space: pre-wrap; }
.diff-line.added { background: rgba(74,222,128,0.08); color: var(--green); }
.diff-line.removed { background: rgba(248,113,113,0.08); color: var(--red); }
.diff-line.read-line { background: transparent; color: var(--text-2); }
.read-lineno { display: inline-block; min-width: 36px; text-align: right; color: var(--text-3); margin-right: 8px; user-select: none; opacity: 0.5; }
.diff-hunk { position: relative; border-left: 2px solid transparent; }
.diff-hunk:hover { border-left-color: var(--accent); }
.diff-hunk-actions { position: absolute; right: 4px; top: 2px; display: none; gap: 2px; z-index: 2; }
.diff-hunk:hover .diff-hunk-actions { display: flex; }
.diff-hunk-btn { width: 20px; height: 20px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface-2); color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; padding: 0; }
.diff-hunk-btn.accept:hover { background: var(--green-dim); color: var(--green); border-color: var(--green); }
.diff-hunk-btn.reject:hover { background: rgba(248,113,113,0.1); color: var(--red); border-color: var(--red); }
.diff-hunk.accepted { opacity: 0.5; border-left-color: var(--green); }
.diff-hunk.accepted .diff-hunk-actions { display: none !important; }
.diff-hunk.rejected { border-left-color: var(--red); opacity: 0.6; }
.diff-hunk.rejected .diff-hunk-actions { display: none !important; }
.diff-line.context { color: var(--text-3); }
.diff-hidden { padding: 4px 14px; color: var(--text-3); font-size: 11px; font-style: italic; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); margin: 2px 0; text-align: center; cursor: pointer; user-select: none; }
.diff-hidden:hover { background: rgba(255,255,255,0.03); }

/* ── Tool Call ── */
.tool-call { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); margin: 6px 0; overflow: hidden; max-width: 90%; animation: fadeIn 0.2s ease; }
.tool-call.reverted { opacity: 0.55; }
.tool-call-header { padding: 9px 14px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; cursor: pointer; user-select: none; }
.tool-call-header:hover { background: rgba(255,255,255,0.03); }
.tool-call-actions { display: none; align-items: center; gap: 4px; margin-left: 6px; flex-shrink: 0; }
.tool-call-header:hover .tool-call-actions { display: flex; }
.tool-call-actions button { border: none; background: none; color: var(--text-3); cursor: pointer; font-size: 14px; padding: 2px; display: flex; align-items: center; border-radius: 3px; }
.tool-call-actions button:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.tool-call-chevron { color: var(--text-3); font-size: 16px; transition: transform 0.2s ease; flex-shrink: 0; display: flex; align-items: center; }
.tool-call.expanded .tool-call-chevron { transform: rotate(90deg); }
.tool-icon { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: var(--mono); }
.tool-icon.exec { background: var(--green-dim); color: var(--green); }
.tool-icon.read { background: var(--accent-dim); color: var(--accent); }
.tool-icon.edit { background: var(--orange-dim); color: var(--orange); font-size: 13px; }
.tool-icon.search { background: var(--orange-dim); color: var(--orange); }
.tool-icon.think { background: var(--purple-dim); color: var(--purple); }
.tool-desc { color: var(--text); font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.tool-file-link { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.tool-file-link:hover { color: var(--accent); text-decoration: underline; }
.tool-cmd-inline { color: var(--text-3); font-family: var(--mono); font-size: 11.5px; font-weight: 400; margin-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.tool-label { color: var(--text-3); font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.3px; flex-shrink: 0; }
.diff-stats { font-family: var(--mono); font-size: 11.5px; font-weight: 500; margin-left: auto; flex-shrink: 0; display: flex; gap: 6px; }
.diff-stats .added-count { color: var(--green); }
.diff-stats .removed-count { color: var(--red); }
.diff-stats + .tool-status { margin-left: 8px; }
.tool-status { margin-left: auto; font-size: 11px; display: flex; align-items: center; gap: 5px; font-weight: 500; flex-shrink: 0; }
.tool-status.success { color: var(--green); }
.tool-status.running { color: var(--orange); }
.tool-status.error { color: var(--red); }
.tool-call-body { display: none; border-top: 1px solid var(--border); }
.tool-call.expanded .tool-call-body { display: block; }
.tool-terminal-cmd { padding: 8px 14px; font-family: var(--mono); font-size: 12px; color: var(--text); background: var(--surface-3); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.tool-terminal-cmd .prompt { color: var(--green); font-weight: 600; }
.tool-terminal { padding: 10px 14px; font-family: var(--mono); font-size: 12px; line-height: 1.65; color: var(--text-2); white-space: pre-wrap; max-height: 300px; overflow-y: auto; background: var(--bg); font-variant-ligatures: none; }

/* ── Experience block ── */
.experience-block { background: var(--surface-2); border: 1px solid var(--border); border-left: 3px solid var(--text-3); border-radius: 2px var(--radius) var(--radius) 2px; padding: 10px 14px; margin: 8px 0; font-size: 12.5px; color: var(--text-2); max-width: 90%; line-height: 1.55; }

/* ── Task Complete ── */
.task-complete { text-align: center; padding: 14px; margin: 12px 0; font-size: 12.5px; font-weight: 600; color: var(--green); display: flex; align-items: center; justify-content: center; gap: 8px; }
.task-complete .task-time { font-weight: 400; color: var(--text-3); font-size: 12px; margin-left: 4px; }
.task-complete.task-limit { color: var(--orange); }
.task-complete.task-limit .task-time { color: var(--text-3); }
.task-complete.task-failed { color: var(--red); }
.task-complete.task-failed .task-time { color: var(--text-3); }

.file-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; overflow: hidden; }
.file-summary-header { display: flex; align-items: center; gap: 6px; padding: 8px 12px; font-size: 12.5px; font-weight: 500; color: var(--text-2); cursor: pointer; user-select: none; }
.file-summary-header:hover { background: rgba(255,255,255,0.03); }
.file-summary-chevron { font-size: 14px; color: var(--text-3); transition: transform 0.2s; }
.file-summary.expanded .file-summary-chevron { transform: rotate(90deg); }
.file-summary-list { display: none; padding: 4px 12px 8px; }
.file-summary.expanded .file-summary-list { display: block; }
.file-summary-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; color: var(--text); }
.file-summary-item i { color: var(--text-3); font-size: 14px; }
.file-tag-new { font-size: 10px; color: var(--green); background: var(--green-dim); padding: 0 4px; border-radius: 3px; font-weight: 500; }
.file-stat { font-size: 11px; font-family: var(--mono); margin-left: auto; display: flex; gap: 4px; }
.file-stat .added-count { color: var(--green); }
.file-stat .removed-count { color: var(--red); }

/* ── Persistent Task File Bar ── */
.task-file-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin: 0 28px 8px; overflow: hidden; transition: opacity 0.3s ease; }
.task-file-bar.removing { opacity: 0; }
.task-file-bar .file-summary-header { display: flex; align-items: center; gap: 6px; padding: 8px 12px; font-size: 12.5px; font-weight: 500; color: var(--text-2); cursor: pointer; user-select: none; }
.task-file-bar .file-summary-header:hover { background: rgba(255,255,255,0.03); }
.task-file-bar .file-summary-chevron { font-size: 14px; color: var(--text-3); transition: transform 0.2s; }
.task-file-bar.expanded .file-summary-chevron { transform: rotate(90deg); }
.task-file-bar .file-summary-list { display: none; padding: 4px 12px 8px; }
.task-file-bar.expanded .file-summary-list { display: block; }
.task-file-actions { display: flex; gap: 6px; margin-left: auto; }
.task-file-btn { border: none; border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
.task-file-btn:disabled { opacity: 0.4; cursor: default; }
.task-file-revert { background: rgba(255,100,100,0.15); color: var(--red); }
.task-file-revert:hover { background: rgba(255,100,100,0.25); }
.task-file-save { background: rgba(100,255,100,0.15); color: var(--green); }
.task-file-save:hover { background: rgba(100,255,100,0.25); }
.file-item-actions { display: flex; gap: 2px; flex-shrink: 0; }
.file-item-btn { border: none; background: transparent; cursor: pointer; padding: 2px 4px; border-radius: 4px; color: var(--text-3); font-size: 14px; line-height: 1; display: flex; align-items: center; }
.file-item-btn:hover { background: rgba(255,255,255,0.08); }
.file-item-btn.reject:hover { color: var(--red); background: rgba(255,100,100,0.12); }
.file-item-btn.accept:hover { color: var(--green); background: rgba(100,255,100,0.12); }
.file-summary-item { transition: opacity 0.3s ease, max-height 0.3s ease; max-height: 40px; overflow: hidden; }
.file-summary-item.accepted { opacity: 0.6; }
.file-summary-item.accepted .file-item-btn { display: none; }
.file-summary-item.rejected { opacity: 0.5; text-decoration: line-through; }
.file-summary-item.rejected .file-item-btn { display: none; }
.file-summary-item.removing { opacity: 0; max-height: 0; padding: 0; margin: 0; }
.file-result-icon { font-size: 14px; margin-left: 4px; flex-shrink: 0; }
.file-result-icon.accept-icon { color: var(--green); }
.file-result-icon.reject-icon { color: var(--red); }

/* ── Block animations ── */
.block-enter { opacity: 0; transform: translateY(8px); }
.msg-user, .msg-group, .msg-text, .tool-call, .experience-block, .task-complete {
  transition: opacity 0.3s ease, transform 0.3s ease;
}

/* ── Spinner ── */
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
.spinner-sm { width: 10px; height: 10px; border-width: 1.5px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Input ── */
.input-area { padding: 16px 28px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-field {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 11px 16px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  min-height: 44px;
  max-height: 160px;
  line-height: 20px;
  resize: none;
  overflow-y: auto;
}
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--text-3); }
.input-field:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-send { width: 44px; height: 44px; border: none; border-radius: var(--radius-lg); background: var(--accent); color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; position: relative; }
.btn-send:hover { filter: brightness(1.15); }
.btn-send:disabled { opacity: 0.35; cursor: default; }
.queue-badge { position: absolute; top: -4px; right: -4px; background: var(--red); color: white; font-size: 10px; font-weight: 600; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
/* ── Floating Action Panel (Stop + Scroll) ── */
.float-actions { display: none; justify-content: center; gap: 8px; padding: 8px 28px 0; flex-shrink: 0; }
.float-actions.visible { display: flex; }
.float-action-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2); font-size: 12px; font-weight: 500; font-family: var(--font); cursor: pointer; transition: all 0.2s; }
.float-action-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-active); }
.float-action-btn i { font-size: 14px; }
.float-action-btn.stop-btn { border-color: var(--red); background: var(--red-dim); color: var(--red); }
.float-action-btn.stop-btn:hover { background: var(--red); color: white; }
.shortcut-hint { font-size: 10px; color: var(--text-3); text-align: center; padding-top: 6px; }
.shortcut-hint kbd { background: var(--surface-3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 4px; font-family: var(--mono); font-size: 9px; color: var(--text-2); }
.shortcut-hint kbd::selection { color: white; background: var(--accent); }
.shortcut-hint::selection { color: white; background: var(--accent); }

/* legacy: hidden, replaced by float-actions panel */
.scroll-to-bottom { display: none !important; }

/* ── Session Actions ── */
.session-title-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-actions { display: none; align-items: center; gap: 2px; flex-shrink: 0; }
.session-item:hover .session-actions { display: flex; }
.session-act-btn { border: none; background: none; color: var(--text-3); cursor: pointer; font-size: 13px; padding: 2px; border-radius: 3px; display: flex; align-items: center; }
.session-act-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.session-act-btn.danger:hover { color: var(--red); }
.session-rename-input { background: var(--surface-3); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 0 6px; flex: 1; outline: none; min-width: 0; height: 18px; line-height: 18px; }

/* ── Delete Confirmation ── */
.session-delete-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
.session-delete-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.session-delete-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.session-delete-msg { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 18px; }
.session-delete-btns { display: flex; justify-content: flex-end; gap: 8px; }
.session-delete-btns button { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: var(--font); }
.sdb-cancel { background: var(--surface-3); color: var(--text); }
.sdb-cancel:hover { background: var(--border-active); }
.sdb-confirm { background: var(--red); color: white; }
.sdb-confirm:hover { filter: brightness(1.15); }

/* ── Welcome state ── */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text-3); gap: 12px; }
.load-more-btn { text-align: center; padding: 8px 16px; margin: 8px auto; font-size: 12px; color: var(--text-3); cursor: pointer; border-radius: 6px; transition: all var(--transition); user-select: none; }
.load-more-btn:hover { color: var(--text-1); background: var(--bg-3); }
.welcome-icon { font-size: 48px; color: var(--accent); opacity: 0.4; }
.welcome-text { font-size: 14px; }

/* ── Debug Toggle ── */
.debug-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-size: 12px; color: var(--text-2); padding: 4px 10px; border-radius: 6px; border: 1px solid transparent; transition: all var(--transition); }
.debug-toggle:hover { color: var(--text-2); border-color: var(--border); }
.debug-toggle.active { color: var(--orange); border-color: rgba(251,191,36,0.3); background: var(--orange-dim); }
.debug-toggle .toggle-track { width: 28px; height: 14px; border-radius: 7px; background: var(--surface-3); position: relative; transition: background 0.2s ease; }
.debug-toggle.active .toggle-track { background: var(--orange); }
.debug-toggle .toggle-knob { width: 10px; height: 10px; border-radius: 50%; background: var(--text-3); position: absolute; top: 2px; left: 2px; transition: transform 0.2s ease, background 0.2s ease; }
.debug-toggle.active .toggle-knob { transform: translateX(14px); background: white; }

/* ── Debug Blocks ── */
.debug-block { display: none; margin: 2px 0; max-width: 90%; animation: fadeIn 0.15s ease; }
body.debug-mode .debug-block { display: block; }
.debug-block-inner { background: var(--surface); border: 1px solid var(--border); border-left: 2px solid var(--text-3); border-radius: 2px var(--radius) var(--radius) 2px; overflow: hidden; opacity: 0.6; font-size: 11px; }
.debug-block-header { padding: 4px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text-3); font-family: var(--mono); user-select: none; }
.debug-block-header:hover { background: rgba(255,255,255,0.02); }
.debug-block-header .debug-type { font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.debug-block-header .debug-usage { color: var(--orange); font-weight: 600; font-size: 10px; white-space: nowrap; }
.debug-block-header .debug-sep { color: var(--border-active); margin: 0 2px; }
.debug-block-header .debug-chevron { margin-left: auto; font-size: 12px; transition: transform 0.15s; }
.debug-copy { cursor: pointer; font-size: 13px; opacity: 0.5; transition: opacity 0.15s; flex-shrink: 0; }
.debug-copy:hover { opacity: 1; color: var(--accent); }
.debug-block.expanded .debug-chevron { transform: rotate(90deg); }
.debug-block-body { display: none; padding: 6px 10px; font-family: var(--mono); font-size: 10.5px; line-height: 1.5; color: var(--text-3); white-space: pre-wrap; max-height: 200px; overflow-y: auto; border-top: 1px solid var(--border); background: var(--bg); }
.debug-block.expanded .debug-block-body { display: block; }

/* ── Center Notice (model switch, turn limit, etc.) ── */
.center-notice { text-align: center; padding: 10px 0; animation: fadeIn 0.3s ease; }
.center-notice-inner { display: inline-flex; align-items: center; gap: 8px; padding: 5px 16px; font-size: 12px; color: var(--text-2); border-radius: 20px; background: var(--surface-2); }
.center-notice-inner img { width: 14px; height: 14px; border-radius: 3px; opacity: 1 !important; }
.center-notice-inner strong { color: var(--text-2); font-weight: 600; }
.center-notice-inner i { font-size: 14px; }

/* ── LLM Status (model info line) ── */
.llm-status { margin: 4px 0; max-width: 90%; animation: fadeIn 0.2s ease; }
.llm-status-inner { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 11.5px; color: var(--text-3); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); }
.llm-status-inner.done { color: var(--text-2); }
.llm-status-inner.done svg { color: var(--green); }
.llm-status-text strong { color: var(--text-2); font-weight: 600; }

/* ── Model Info Line ── */
.model-info { display: flex; align-items: center; gap: 7px; padding: 4px 0; margin: 8px 0 2px; font-size: 11.5px; color: var(--text-3); animation: fadeIn 0.2s ease; white-space: nowrap; flex-wrap: nowrap; overflow: hidden; }
.model-info img { width: 16px; height: 16px; border-radius: 3px; opacity: 1 !important; }
.model-info .model-name { font-weight: 600; color: var(--text-2); }
.model-info .model-latency { font-family: var(--mono); font-size: 10.5px; }
.model-info .model-round { font-family: var(--mono); font-size: 10px; color: var(--text-3); }
.model-info .model-sep { color: var(--border-active); }
.model-info .model-spinner { display: inline-block; vertical-align: middle; }
.model-info .model-info-icon { font-size: 16px; color: var(--accent); }
.debug-link { cursor: pointer; transition: color 0.15s; }
.debug-link:hover { color: var(--accent); }
.round-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.round-detail-overlay.open { opacity: 1; pointer-events: auto; }
.round-detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; min-width: 340px; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.round-detail-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.round-detail-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
.round-detail-table td:first-child { color: var(--text-3); font-weight: 500; width: 40%; }
.round-detail-table td:last-child { font-family: var(--mono); font-size: 11.5px; }
.round-detail-table td.token-link { cursor: pointer; color: var(--accent); }
.round-detail-table td.token-link:hover { opacity: 0.7; }

/* ── Mode/Model Selector ── */
.input-selectors { display: flex; align-items: center; gap: 8px; padding-top: 8px; }
.model-select { padding: 4px 10px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2); font-size: 12px; font-family: var(--font); cursor: pointer; outline: none; -webkit-appearance: none; appearance: none; }
.model-select:hover { border-color: var(--text-3); color: var(--text); }
.model-select:focus { border-color: var(--accent); }
.selector-spacer { flex: 1; }

/* ── Custom pill selector ── */
.pill-select { position: relative; display: inline-flex; }
.pill-btn { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2); font-size: 12px; font-family: var(--font); cursor: pointer; outline: none; white-space: nowrap; transition: all var(--transition); }
.pill-btn i.bx { color: var(--accent); }
.pill-btn:hover { border-color: var(--text-3); color: var(--text); }
.pill-btn img { width: 14px; height: 14px; border-radius: 3px; opacity: 1 !important; }
.pill-btn i { font-size: 14px; }
.pill-btn .pill-chevron { font-size: 10px; color: var(--text-3); margin-left: 2px; }
.pill-menu { display: none; position: absolute; bottom: calc(100% + 4px); left: 0; min-width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 100; overflow: hidden; animation: fadeIn 0.15s ease; }
.pill-menu.open { display: flex; flex-direction: column; }
.pill-menu-items { overflow-y: auto; max-height: 280px; }
.pill-menu-search { border-top: 1px solid var(--border); padding: 6px 8px; }
.pill-menu-search input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; color: var(--text); font-size: 11px; font-family: var(--font); outline: none; }
.pill-menu-search input:focus { border-color: var(--accent); }
.pill-menu-search input::placeholder { color: var(--text-3); }
.pill-option { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 12px; color: var(--text-2); cursor: pointer; transition: background 0.1s; }
.pill-option:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.pill-option.active { color: var(--accent); }
.pill-option img { width: 14px; height: 14px; border-radius: 3px; opacity: 1 !important; }
.pill-option i.bx { font-size: 15px; }

/* ── Ask User ── */
.ask-user-block { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; margin: 6px 0; background: var(--orange-dim); border: 1px solid rgba(251,191,36,0.2); border-radius: var(--radius-lg); max-width: 90%; animation: fadeIn 0.3s ease; }
.ask-user-icon { width: 24px; height: 24px; border-radius: 50%; background: var(--orange); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.ask-user-text { font-size: 13px; line-height: 1.55; color: var(--text); }

/* ── Tool icon extras ── */
.tool-icon.write_file { background: var(--green-dim); color: var(--green); }
.tool-icon.write { background: var(--green-dim); color: var(--green); font-size: 13px; }
.tool-icon.read_file { background: var(--accent-dim); color: var(--accent); }
.tool-icon.ask_user { background: var(--orange-dim); color: var(--orange); }
.tool-natural-icon { color: var(--text-3); font-size: 14px; flex-shrink: 0; }
.tool-detail { color: var(--text-3); font-size: 11.5px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.tool-file-tag { font-size: 10px; color: var(--green); background: var(--green-dim); padding: 1px 5px; border-radius: 3px; font-weight: 500; }
.tool-call.no-expand .tool-call-chevron { visibility: hidden; }
.tool-call.no-expand .tool-call-header { cursor: default; }
.tool-code-preview { background: var(--surface-2); border-radius: 4px; padding: 10px 12px; margin: 0; overflow-x: auto; }
.tool-code-preview code { font-family: var(--mono); font-size: 11.5px; color: var(--text); white-space: pre; line-height: 1.5; }
.tool-write-result { font-size: 12px; color: var(--text-3); padding: 6px 0; }

::-webkit-scrollbar { width: 6px; height: 0; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.tool-terminal::-webkit-scrollbar, .md-codeblock::-webkit-scrollbar, .tool-code-preview::-webkit-scrollbar { height: 4px; }
.tool-terminal::-webkit-scrollbar-thumb, .md-codeblock::-webkit-scrollbar-thumb, .tool-code-preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

<body>

<aside class="sidebar" id="sidebar">
  <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar"><i class="bx bx-chevron-left"></i></button>
  <div class="sidebar-header">
    <h1><div class="sidebar-logo"><i class="bx bx-bot"></i></div> Assistant</h1>

<main class="main">
  <div class="main-header">

  </div>

  <div class="pinned-panels" id="pinned-panels">

<script src="agent_gui_engine.js"></script>
<script>
const $ = id => document.getElementById(id);

let activeSessionId = null;
let sessions = {};
let sending = false;
let debugMode = false;
let currentMode = 'agent';
let currentModel = 'zhipu-glm-4.7-flash';
let currentTurnLimit = 20;

const ZHIPU_LOGO = 'https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/zhipu-color.svg';
const GOOGLE_LOGO = 'https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/gemini-color.svg';
const BAIDU_LOGO = 'https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/wenxin-color.svg';
const TENCENT_LOGO = 'https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/hunyuan-color.svg';
const SILICONFLOW_LOGO = 'https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/siliconcloud-color.svg';
const _ICON = n => `https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/${n}-color.svg`;
const _ICON_PLAIN = n => `https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/${n}.svg`;
const CURSOR_LOGO = _ICON_PLAIN('cursor');
const COPILOT_LOGO = _ICON('copilot');
const WINDSURF_LOGO = _ICON_PLAIN('windsurf');
const PROVIDER_LOGOS = {
  zhipu: _ICON('zhipu'),
  google: _ICON('google'),
  baidu: _ICON('baidu'),
  tencent: _ICON('tencent'),
  siliconflow: _ICON('siliconcloud'),
  nvidia: _ICON('nvidia'),
  alibaba: _ICON('alibaba'),
  qwen: _ICON('qwen'),
  cursor: CURSOR_LOGO,
  copilot: COPILOT_LOGO,
  windsurf: WINDSURF_LOGO,
  'github-copilot': COPILOT_LOGO,
};
const MODEL_LOGOS = {
  'zhipu-glm-4.7-flash': ZHIPU_LOGO,
  'zhipu-glm-4-flash': ZHIPU_LOGO,
  'zhipu-glm-4.7': ZHIPU_LOGO,
  'nvidia-glm-4-7b': 'https://registry.npmmirror.com/@lobehub/icons-static-svg/latest/files/icons/nvidia-color.svg',
  'google-gemini-2.0-flash': GOOGLE_LOGO,
  'baidu-ernie-speed-8k': BAIDU_LOGO,
  'tencent-hunyuan-lite': TENCENT_LOGO,
  'siliconflow-qwen2.5-7b': SILICONFLOW_LOGO,
  'auto': ZHIPU_LOGO,
  'cursor': CURSOR_LOGO,
  'copilot': COPILOT_LOGO,
  'windsurf': WINDSURF_LOGO,
};

const MODEL_DISPLAY_NAMES = {
  'auto': 'Auto',
  'zhipu-glm-4.7-flash': 'GLM-4.7-Flash',
  'zhipu-glm-4-flash': 'GLM-4-Flash',
  'zhipu-glm-4.7': 'GLM-4.7',
  'google-gemini-2.0-flash': 'Gemini 2.0 Flash',
  'baidu-ernie-speed-8k': 'ERNIE Speed 8K',
  'tencent-hunyuan-lite': 'Hunyuan Lite',
  'siliconflow-qwen2.5-7b': 'Qwen 2.5 7B',
  'cursor': 'Cursor',
  'copilot': 'Copilot',
  'windsurf': 'Windsurf',
};

const AI_IDE_PROVIDERS = new Set(['cursor', 'copilot', 'windsurf', 'github-copilot']);

const ENV_LOGOS = {
  'cursor': CURSOR_LOGO,
  'copilot': COPILOT_LOGO,
  'windsurf': WINDSURF_LOGO,
};

function resolveDisplayName(provider, model) {
  if (AI_IDE_PROVIDERS.has(provider) && model) {
    const baseName = MODEL_DISPLAY_NAMES[provider] || provider;
    return `${baseName} (${model})`;
  }
  return MODEL_DISPLAY_NAMES[provider] || provider;
}

function resolveModelLogo(provider) {
  if (MODEL_LOGOS[provider]) return MODEL_LOGOS[provider];
  const vendor = (provider || '').split('-')[0];
  if (PROVIDER_LOGOS[vendor]) return PROVIDER_LOGOS[vendor];
  return ZHIPU_LOGO;
}

const MODE_ICONS = { agent: 'bx-bot', plan: 'bx-edit', ask: 'bx-chat' };
const MODE_LABELS = { agent: 'Agent', plan: 'Plan', ask: 'Ask' };

const MODEL_OPTIONS = [
  { value: 'auto', label: 'Auto' },
  { value: 'zhipu-glm-4.7-flash', label: 'GLM-4.7-Flash' },
  { value: 'zhipu-glm-4-flash', label: 'GLM-4-Flash' },
  { value: 'zhipu-glm-4.7', label: 'GLM-4.7' },
  { value: 'google-gemini-2.0-flash', label: 'Gemini 2.0 Flash' },
  { value: 'baidu-ernie-speed-8k', label: 'ERNIE Speed 8K' },
  { value: 'tencent-hunyuan-lite', label: 'Hunyuan Lite' },
  { value: 'siliconflow-qwen2.5-7b', label: 'Qwen 2.5 7B' },
].sort((a, b) => {
  if (a.value === 'auto') return -1;
  if (b.value === 'auto') return 1;
  return a.label.localeCompare(b.label);
});

function buildPillSelect(container, options, currentValue, onChange, opts = {}) {
  const searchable = opts.searchable !== false && options.length > 5;
  function render(filter) {
    const current = options.find(o => o.value === currentValue) || options[0];
    let iconHtml;
    if (current.logo) iconHtml = `<img src="${current.logo}" alt="">`;
    else if (current.icon) iconHtml = `<i class="bx ${current.icon}"></i>`;
    else iconHtml = '';

    const filtered = filter
      ? options.filter(o => o.label.toLowerCase().includes(filter.toLowerCase()))
      : options;

    const itemsHtml = filtered.map(o => {
      let oIcon;
      if (o.logo) oIcon = `<img src="${o.logo}" alt="">`;
      else if (o.icon) oIcon = `<i class="bx ${o.icon}"></i>`;
      else oIcon = '';
      return `<div class="pill-option${o.value === currentValue ? ' active' : ''}" data-value="${esc(o.value)}">${oIcon} ${esc(o.label)}</div>`;
    }).join('');

    const searchHtml = searchable
      ? `<div class="pill-menu-search"><input type="text" placeholder="Search..." value="${esc(filter || '')}"></div>`
      : '';

    container.innerHTML = `<button class="pill-btn">${iconHtml} ${esc(current.label)}<i class="bx bx-chevron-down pill-chevron"></i></button>`
      + `<div class="pill-menu"><div class="pill-menu-items">${itemsHtml}</div>${searchHtml}</div>`;

    const btn = container.querySelector('.pill-btn');
    const menu = container.querySelector('.pill-menu');
    btn.onclick = (e) => { e.stopPropagation(); menu.classList.toggle('open'); const si = menu.querySelector('.pill-menu-search input'); if (si) setTimeout(() => si.focus(), 50); };
    container.querySelectorAll('.pill-option').forEach(opt => {
      opt.onclick = (e) => {
        e.stopPropagation();
        currentValue = opt.dataset.value;
        menu.classList.remove('open');
        onChange(currentValue);
        render();
      };
    });
    const searchInput = menu.querySelector('.pill-menu-search input');
    if (searchInput) {
      searchInput.onclick = (e) => e.stopPropagation();
      searchInput.oninput = (e) => {
        const wasOpen = menu.classList.contains('open');
        render(e.target.value);
        if (wasOpen) container.querySelector('.pill-menu').classList.add('open');
        const ni = container.querySelector('.pill-menu-search input');
        if (ni) { ni.focus(); ni.selectionStart = ni.selectionEnd = ni.value.length; }
      };
    }
  }
  render();
  document.addEventListener('click', () => {
    const m = container.querySelector('.pill-menu');
    if (m) m.classList.remove('open');
  });
  return { setValue(v) { currentValue = v; render(); }, setOptions(newOpts) { options = newOpts; render(); } };
}

function setMode(mode) {
  currentMode = mode;
  const welcome = $('welcome');
  if (welcome) {
    const icon = welcome.querySelector('.welcome-icon');
    if (icon) {
      icon.className = 'bx ' + (MODE_ICONS[mode] || 'bx-bot') + ' welcome-icon';
    }
  }
}

function setModel(model) {
  currentModel = model;
  fetch('/api/model', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({model}),
  }).catch(err => console.warn('Model switch failed:', err));
}
function setTurnLimit(val) {
  currentTurnLimit = parseInt(val, 10) || 0;
}

function createModelInfoLine(provider, round, latency, model) {
  const name = resolveDisplayName(provider, model);
  const logo = resolveModelLogo(provider);
  const div = document.createElement('div');
  div.className = 'model-info';
  let html = `<img src="${logo}" alt="${name}">`;
  html += `<span class="model-name">${name}</span>`;
  if (round > 1) html += `<span class="model-sep">·</span><span class="model-round">round ${round}</span>`;
  if (latency) html += `<span class="model-sep">·</span><span class="model-latency">${latency}s</span>`;
  div.innerHTML = html;
  return div;
}

function toggleDebug() {
  debugMode = !debugMode;
  document.body.classList.toggle('debug-mode', debugMode);
  $('debug-toggle').classList.toggle('active', debugMode);
  engine.setDebugMode(debugMode, createDebugBlock);
}

const THEMES = {
  dark:      { label: 'Dark',      icon: 'bx-moon',    cls: '' },
  light:     { label: 'Light',     icon: 'bx-sun',     cls: 'light-mode' },
  brilliant: { label: 'Brilliant', icon: 'bx-palette',  cls: 'brilliant-mode' },
};
let currentTheme = localStorage.getItem('theme') || 'dark';
if (!THEMES[currentTheme]) currentTheme = 'dark';

/* ── i18n ── */
const _I18N = {
  zh: {
    'Settings': '设置', 'General': '通用', 'Models': '模型', 'Providers': '供应商',
    'Debug': '调试', 'Stop': '停止', 'New session': '新会话',
    'Agent': '代理', 'Plan': '计划', 'Ask': '问答', 'Auto': '自动',
    'Color Mode': '颜色模式', 'Language': '语言', 'Appearance': '外观',
    'Context & Limits': '上下文限制', 'Configured': '已配置', 'Not configured': '未配置',
    'Validate & Save': '验证并保存', 'Guide': '指南', 'Delete': '删除',
    'Usage': '用量', 'Benchmarks': '基准测试',
    'Revert all': '全部撤回', 'Save all': '全部保存',
    'Dark': '深色', 'Light': '浅色', 'Brilliant': '明亮',
    'Type a message. Ctrl+Enter to send.': '输入消息。Ctrl+Enter 发送。',
    'rounds': '轮', 'files': '文件', 'File': '文件', 'Files': '文件',
    'modified': '已修改', 'new': '新建', 'reverted': '已撤回',
    'Task completed': '任务完成', 'Task failed, please try again': '任务失败，请重试',
    'Round limit reached': '已达轮数上限',
    'Calls': '调用', 'Input Tokens': '输入令牌', 'Output Tokens': '输出令牌', 'Cost': '费用',
    'Recent Calls': '最近调用', 'API Keys': 'API 密钥', 'Add Key': '添加密钥',
    'Token History': '令牌历史', 'No API keys configured': '未配置 API 密钥',
    'Providers': '供应商', 'Models': '模型',
  },
  ar: {
    'Settings': 'الإعدادات', 'General': 'عام', 'Models': 'النماذج', 'Providers': 'المزودون',
    'Debug': 'تصحيح', 'Stop': 'إيقاف', 'New session': 'جلسة جديدة',
    'Agent': 'الوكيل', 'Plan': 'خطة', 'Ask': 'سؤال', 'Auto': 'تلقائي',
  },
};
let _guiLang = localStorage.getItem('guiLang') || 'en';
function _(key) {
  if (_guiLang === 'en' || !_I18N[_guiLang]) return key;
  return _I18N[_guiLang][key] || key;
}
function _applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = _(el.dataset.i18n);
  });
  const inp = $('input');
  if (inp) inp.placeholder = _('Type a message. Ctrl+Enter to send.');
  _refreshPillLabels();
  renderSettingsTab();
}
function _refreshPillLabels() {
  if (typeof modePill !== 'undefined' && modePill) {
    modePill.setOptions(Object.keys(MODE_ICONS).map(k => ({ value: k, label: _(MODE_LABELS[k]), icon: MODE_ICONS[k] })));
  }
  if (typeof modelPill !== 'undefined' && modelPill) {
    modelPill.setOptions(MODEL_OPTIONS.map(o => ({ value: o.value, label: _(o.label), logo: MODEL_LOGOS[o.value] || ZHIPU_LOGO })));
  }
  const turnSel = $('turn-limit-select');
  if (turnSel) {
    turnSel.querySelectorAll('option').forEach(opt => {
      const n = opt.value;
      opt.textContent = n + ' ' + _('rounds');
    });
  }
}

function applyTheme(name) {
  currentTheme = name;
  document.body.classList.remove('light-mode', 'brilliant-mode');
  if (THEMES[name]?.cls) document.body.classList.add(THEMES[name].cls);
  const icon = $('theme-icon');
  if (icon) icon.className = 'bx ' + (THEMES[name]?.icon || 'bx-moon');
  localStorage.setItem('theme', name);
}

function cycleTheme() {
  const keys = Object.keys(THEMES);
  const next = keys[(keys.indexOf(currentTheme) + 1) % keys.length];
  applyTheme(next);
  if (settingsTab === 'general') renderSettingsTab();
}

(function initTheme() { applyTheme(currentTheme); })();

function formatDebugUsage(evt) {
  const parts = [];
  const usage = evt.usage || {};
  const pt = usage.prompt_tokens || 0;
  const ct = usage.completion_tokens || 0;
  const total = pt + ct;
  if (total > 0) parts.push(`${total} tokens`);
  if (usage.cost != null) {
    parts.push(`$${usage.cost.toFixed(4)}`);
  } else if (total > 0) {
    parts.push('$0.00');
  }
  if (evt.latency_s) parts.push(`${evt.latency_s}s`);
  return parts.length ? parts.join(' · ') : '';
}

const DEBUG_EVENT_TYPES = new Set([
  'llm_request', 'llm_response_start', 'llm_response_end',
  'tool', 'tool_result', 'text', 'user', 'complete',
  'thinking', 'experience', 'ask_user', 'notice', 'file_summary'
]);

function createDebugBlock(evt) {
  if (!DEBUG_EVENT_TYPES.has(evt.type)) return null;
  const div = document.createElement('div');
  div.className = 'debug-block';
  const typeName = evt.type || 'unknown';
  const usageLine = formatDebugUsage(evt);
  const usageHtml = usageLine
    ? `<span class="debug-usage">${esc(usageLine)}</span><span class="debug-sep">·</span>`
    : '';

  div.innerHTML = `
    <div class="debug-block-inner">
      <div class="debug-block-header" onclick="this.parentElement.parentElement.classList.toggle('expanded')">
        <i class="bx bx-clipboard debug-copy" title="Copy JSON" onclick="event.stopPropagation();var t=this.closest('.debug-block').querySelector('.debug-block-body').textContent;navigator.clipboard.writeText(t);this.className='bx bx-check debug-copy';setTimeout(()=>this.className='bx bx-clipboard debug-copy',1200)"></i>

/* ── Send Message ── */
let taskRunning = false;
let _messageQueue = [];

function _updateQueueBadge() {
  const btn = $('btn-send');
  const badge = btn.querySelector('.queue-badge');
  if (_messageQueue.length > 0 && taskRunning) {
    if (!badge) {
      const b = document.createElement('span');
      b.className = 'queue-badge';
      b.textContent = _messageQueue.length;
      btn.appendChild(b);
    } else {
      badge.textContent = _messageQueue.length;
    }
    btn.querySelector('i').className = 'bx bx-list-plus';
  } else {
    if (badge) badge.remove();
    btn.querySelector('i').className = 'bx bx-send';
  }
}

function _updateFloatPanel() {
  const panel = $('float-actions');
  const stopBtn = $('btn-stop');
  const scrollBtn = $('btn-scroll-bottom');
  const chat = $('chat');
  const atBottom = chat ? (chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80) : true;

  stopBtn.style.display = taskRunning ? '' : 'none';
  scrollBtn.style.display = atBottom ? 'none' : '';

  const anyVisible = taskRunning || !atBottom;
  panel.classList.toggle('visible', anyVisible);
}

function setStopMode(on) {
  taskRunning = on;
  _updateFloatPanel();
  _updateQueueBadge();
  if (!on && _messageQueue.length > 0) {
    const queued = _messageQueue.shift();
    _updateQueueBadge();
    $('input').value = queued;
    sendMessage();
  }
}

async function cancelTask() {
  try {
    await fetch('/api/cancel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  } catch (e) { console.warn('Cancel failed:', e); }
}

async function sendMessage() {
  const input = $('input');
  const text = input.value.trim();
  if (!text) return;

  if (taskRunning) {
    _messageQueue.push(text);
    input.value = '';
    input.style.height = 'auto';
    input.placeholder = 'Queued (' + _messageQueue.length + '). Type another or wait...';
    _updateQueueBadge();
    return;
  }

  const welcome = $('welcome');
  if (welcome) welcome.remove();

  if (!activeSessionId) {
    await createNewSession();
  }

  sending = true;
  input.value = '';
  input.style.height = 'auto';
  input.placeholder = _('Type a message. Ctrl+Enter to send.');
  setStopMode(true);
  engine.enqueueEvent({ type: 'user', prompt: text });

  try {
    const payload = { session_id: activeSessionId, text, mode: currentMode, model: currentModel, turn_limit: currentTurnLimit };
    const resp = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (!data.ok) {
      console.error('Send failed:', data.error);
      setStopMode(false);
    }
  } catch (err) {
    console.error('Send error:', err);
    setStopMode(false);
  }
}

/* ── Create New Session ── */
async function createNewSession() {
  try {
    const resp = await fetch('/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: 'New Task' }),
    });
    const data = await resp.json();
    if (data.ok) {
      const sid = data.session_id;
      engine.addSession(sid, 'New Task', 'idle');
      engine.setActiveSession(sid);
      activeSessionId = sid;
      $('main-title').textContent = 'New Task';

      engine.chatArea.innerHTML = '';
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcome';
      const modeIcon = MODE_ICONS[currentMode] || 'bx-bot';
      welcome.innerHTML = '<i class="bx ' + modeIcon + ' welcome-icon"></i><div class="welcome-text">Type a message to start</div>';
      engine.chatArea.appendChild(welcome);

      $('input').disabled = false;
      $('btn-send').disabled = false;
      sending = false;
      $('input').focus();
    }
  } catch (err) {
    console.error('New session error:', err);
  }
}

const INITIAL_EVENTS = 30;
let _pendingOlderEvents = [];
let _allSessionEvents = [];

async function apiActivateSession(sid) {
  const chatArea = $('chat-area');
  chatArea.innerHTML = '';
  _pendingOlderEvents = [];
  _allSessionEvents = [];
  try {
    const resp = await fetch(`/api/history/${sid}`);
    const data = await resp.json();
    if (data.ok && data.events && data.events.length > 0) {
      const allEvents = data.events;
      _allSessionEvents = allEvents;
      let eventsToRender = allEvents;
      if (allEvents.length > INITIAL_EVENTS) {
        _pendingOlderEvents = allEvents.slice(0, allEvents.length - INITIAL_EVENTS);
        eventsToRender = allEvents.slice(allEvents.length - INITIAL_EVENTS);
        const loadMoreBtn = document.createElement('div');
        loadMoreBtn.className = 'load-more-btn';
        loadMoreBtn.id = 'load-more';
        loadMoreBtn.textContent = `Load ${_pendingOlderEvents.length} earlier events`;
        loadMoreBtn.onclick = () => loadOlderEvents();
        chatArea.appendChild(loadMoreBtn);
      }
      engine.setReplayMode(true);
      for (const evt of eventsToRender) {
        await engine.processEvent(evt);
      }
      engine.setReplayMode(false);
    } else {
      chatArea.innerHTML = '<div id="welcome" class="welcome"><p>Type a message to start</p></div>';
    }
  } catch (e) {
    console.warn('Failed to load session history:', e);
    chatArea.innerHTML = '<div id="welcome" class="welcome"><p>Type a message to start</p></div>';
  }
}

async function loadOlderEvents() {
  if (!_pendingOlderEvents.length || !_allSessionEvents.length) return;
  const chatArea = $('chat-area');
  const scrollHeightBefore = chatArea.scrollHeight;
  const scrollTopBefore = chatArea.scrollTop;

  _pendingOlderEvents = [];
  chatArea.innerHTML = '';

  engine.setReplayMode(true);
  for (const evt of _allSessionEvents) {
    await engine.processEvent(evt);
  }
  engine.setReplayMode(false);

  const scrollDelta = chatArea.scrollHeight - scrollHeightBefore;
  chatArea.scrollTop = scrollTopBefore + scrollDelta;
}

function renderModelsView() {
  const models = usageData.models || {};
  const calls = usageData.calls || [];

  if (!modelNames.length) {
    return `<div class="settings-section-title">${_('Models')}</div><div class="settings-empty">No model data yet. Start a conversation to see usage statistics.</div>`;
  }
  let html = `<div class="settings-section-title" style="display:flex;align-items:center;gap:10px;">${_('Models')}<input type="text" id="settings-model-search" placeholder="Filter..." oninput="renderSettingsTab()" style="margin-left:auto;width:120px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--text);font-family:var(--font);outline:none;"></div>`;
  const modelSearch = (document.getElementById('settings-model-search')?.value || '').toLowerCase();
  for (const name of modelNames) {
    const m = models[name];
    if (modelSearch && !(MODEL_DISPLAY_NAMES[name] || name).toLowerCase().includes(modelSearch)) continue;
    const logo = MODEL_LOGOS[name] || ZHIPU_LOGO || '';
    const displayName = MODEL_DISPLAY_NAMES[name] || name;
    const tierBadge = fmtPriceBadge(m, name);
    const configuredProvs = new Set(m.configured_providers || []);
    const provChips = (m.providers || []).map(p => {
      const isProvConfigured = configuredProvs.has(p);
      const chipStyle = isProvConfigured ? 'background:color-mix(in srgb, var(--green) 15%, var(--surface-3));color:var(--green);' : '';
      return `<div class="settings-provider-chip" onclick="settingsTab='providers';renderSettingsTab();setTimeout(()=>{const c=document.querySelector('[data-provider-id=\\'${esc(p.split('-')[0])}\\']');if(c)c.scrollIntoView({behavior:'smooth',block:'center'})},100)" style="cursor:pointer;${chipStyle}">${PROVIDER_LOGOS[p.split('-')[0]] ? '<img src="' + PROVIDER_LOGOS[p.split('-')[0]] + '" style="width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:2px;">' : ''} ${esc(p)}</div>`;
    }).join('');
    const modelCalls = calls.filter(c => c.model === name || c.provider === name);
    const aa = m.aa_benchmarks || {};
    const aaRank = m.aa_rankings || {};
    let benchTags = '';
    const _rankColor = (r) => {
      if (!r) return 'var(--surface-3);color:var(--text-3)';
      if (r <= 3) return r === 1 ? 'linear-gradient(135deg,#FFD700,#FFA500);color:#000;background-size:200% 200%;animation:shimmer 2s ease infinite' : r === 2 ? 'linear-gradient(135deg,#C0C0C0,#E8E8E8);color:#333;background-size:200% 200%;animation:shimmer 2s ease infinite' : 'linear-gradient(135deg,#CD7F32,#E8A862);color:#fff;background-size:200% 200%;animation:shimmer 2s ease infinite';
      if (r <= 5) return 'var(--purple-dim);color:var(--purple)';
      if (r <= 10) return 'var(--accent-dim);color:var(--accent)';
      if (r <= 20) return 'var(--green-dim);color:var(--green)';
      return 'var(--surface-3);color:var(--text-3)';
    };
    const _benchTag = (label, val, rank) => {
      if (!val) return '';
      const rStr = rank ? ` (#${rank})` : '';
      return `<span class="settings-badge" style="background:${_rankColor(rank)};margin-left:2px;cursor:pointer;" onclick="openBenchOverlay('${esc(name)}',event)" title="${label}">${label} ${typeof val === 'number' ? val.toFixed(1) : val}${rStr}</span>`;
    };
    if (aa.intelligence) benchTags += _benchTag('INT', aa.intelligence, aaRank['artificial_analysis_intelligence_index']);
    if (aa.coding) benchTags += _benchTag('CODE', aa.coding, aaRank['artificial_analysis_coding_index']);
    if (aa.math) benchTags += _benchTag('MATH', aa.math, aaRank['artificial_analysis_math_index']);
    const isConfigured = m.configured;
    const cardClass = isConfigured ? 'settings-card configured' : 'settings-card unconfigured';
    html += `<div class="${cardClass}">
      <div class="settings-card-title"><img src="${logo}" alt=""> ${esc(displayName)} ${tierBadge} ${benchTags}${isConfigured ? '<span class="settings-badge" style="background:var(--green-dim);color:var(--green);margin-left:auto;font-size:10px;">' + _('Configured') + '</span>' : ''}</div>

  }
  return html;

const CALLS_PER_PAGE = 8;
const MAX_STORED_CALLS = 1024;
const _callsPageState = {};

function renderCallsTable(calls, tableId) {
  if (!calls.length) return '';
  const all = calls.slice(-MAX_STORED_CALLS).reverse();
  const totalPages = Math.max(1, Math.ceil(all.length / CALLS_PER_PAGE));
  if (!_callsPageState[tableId]) _callsPageState[tableId] = 1;
  const page = Math.min(_callsPageState[tableId], totalPages);
  const start = (page - 1) * CALLS_PER_PAGE;
  const pageItems = all.slice(start, start + CALLS_PER_PAGE);

  const pagerHtml = totalPages > 1 ? `<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:11px;color:var(--text-3);">
    <button onclick="_callsPageNav('${tableId}',-1)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-2);cursor:pointer;padding:2px 8px;font-size:11px;" ${page <= 1 ? 'disabled' : ''}>&lsaquo;</button>
    <span>Page ${page}/${totalPages}</span>
    <button onclick="_callsPageNav('${tableId}',1)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-2);cursor:pointer;padding:2px 8px;font-size:11px;" ${page >= totalPages ? 'disabled' : ''}>&rsaquo;</button>
  </div>` : '';

  return `<div style="margin-top:10px;font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;">Recent Calls</div>
    <table class="settings-table"><thead><tr><th>Time</th><th>Model</th><th>In</th><th>Out</th><th>Latency</th><th>Status</th></tr></thead><tbody>
    ${pageItems.map(c => `<tr>
      <td>${fmtTime(c.timestamp)}</td>
      <td>${esc(MODEL_DISPLAY_NAMES[c.model] || c.model || '-')}</td>
      <td>${c.input_tokens || '-'}</td>
      <td>${c.output_tokens || '-'}</td>
      <td>${c.latency_s ? c.latency_s + 's' : '-'}</td>
      <td class="${c.ok ? 'td-ok' : 'td-err'}">${c.ok ? 'OK' : 'ERR'}</td>
    </tr>`).join('')}
    </tbody></table>${pagerHtml}`;
}

function _callsPageNav(tableId, delta) {
  _callsPageState[tableId] = (_callsPageState[tableId] || 1) + delta;
  renderSettingsTab();
}

function fmtPriceBadge(m, modelKey) {
  const onclick = modelKey ? ` onclick="openPriceOverlay('${modelKey}',event)" style="cursor:pointer;"` : '';
  if (m.free_tier) return `<span class="settings-badge free"${onclick}>Free</span>`;
  if (m.input_price > 0 || m.output_price > 0) {
    const sym = (m.currency || 'USD') === 'CNY' ? '¥' : '$';
    return `<span class="settings-badge paid"${onclick}>${sym}${m.input_price.toFixed(2)},${m.output_price.toFixed(2)}/M</span>`;
  }
  return `<span class="settings-badge paid"${onclick}>Paid</span>`;
}
function fmtTokens(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n); }
function fmtTime(ts) { if (!ts) return '-'; const d = new Date(ts * 1000); return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function maskKey(k) { if (!k || k.length < 8) return '••••'; return k.slice(0, 4) + '••••' + k.slice(-4); }

function openProviderOrderOverlay(modelName) {
  const models = usageData.models || {};

function _renderProvOrderOverlay(overlay) {
  if (!overlay) overlay = document.getElementById('prov-order-overlay');
  if (!overlay || !_provOrderState) return;
  const s = _provOrderState;
  overlay.innerHTML = `<div class="sub-panel">
    <div class="sub-panel-header">

      }).join('')}

      <button onclick="_moveProvider(-1)"><i class="bx bx-up-arrow-alt"></i> Up</button>
      <button onclick="_moveProvider(1)"><i class="bx bx-down-arrow-alt"></i> Down</button>
      <button onclick="_moveProvider(Infinity)"><i class="bx bx-arrow-to-bottom"></i> Bottom</button>
    </div>
  </div>`;

function _moveProvider(dir) {
  const s = _provOrderState;
  if (!s) return;
  const i = s.selected;
  const arr = s.providers;
  if (dir === -Infinity) { const [item] = arr.splice(i, 1); arr.unshift(item); s.selected = 0; }
  else if (dir === Infinity) { const [item] = arr.splice(i, 1); arr.push(item); s.selected = arr.length - 1; }
  else if (dir === -1 && i > 0) { [arr[i], arr[i-1]] = [arr[i-1], arr[i]]; s.selected = i - 1; }
  else if (dir === 1 && i < arr.length - 1) { [arr[i], arr[i+1]] = [arr[i+1], arr[i]]; s.selected = i + 1; }
  _renderProvOrderOverlay();
}

async function validateAndSaveKey(btn) {
  const form = btn.closest('.settings-key-form');
  const container = btn.closest('.settings-add-key');
  const vendor = container.dataset.vendor;
  const input = form.querySelector('.settings-key-input');
  const status = form.querySelector('.settings-key-status');
  const key = input.value.trim();
  if (!key) { _setKeyStatus(status, '<span style="color:var(--red)">Enter a key</span>'); return; }
  btn.disabled = true;
  _setKeyStatus(status, '<span style="color:var(--text-3)">Validating...</span>');
  try {
    const res = await fetch('/api/validate-key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({vendor, key}) });
    const data = await res.json();
    if (data.ok) {
      const saveRes = await fetch('/api/save-key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({vendor, key}) });
      const saveData = await saveRes.json();
      if (saveData.ok) {
        _setKeyStatus(status, '<span style="color:var(--green)"><i class="bx bx-check"></i> Saved</span>');
        input.value = '';
        setTimeout(() => { form.style.display = 'none'; _setKeyStatus(status, ''); fetchUsageData().then(() => renderSettingsTab()); }, 1200);
      } else {
        _setKeyStatus(status, `<span style="color:var(--red)">Save failed: ${esc(saveData.error)}</span>`);
      }
    } else {
      _setKeyStatus(status, `<span style="color:var(--red)"><i class="bx bx-x"></i> ${esc(data.error)}</span>`);
    }
  } catch (e) {
    _setKeyStatus(status, `<span style="color:var(--red)">Network error</span>`);
  }
  btn.disabled = false;
}

async function deleteApiKey(vendor, btn) {
  if (!confirm('Delete this API key?')) return;
  try {
    const res = await fetch('/api/delete-key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({vendor}) });
    const data = await res.json();
    if (data.ok) {
      fetchUsageData().then(() => renderSettingsTab());
    }
  } catch (e) { console.warn('Delete key failed:', e); }
}

/* ── Diff Hunk Actions ── */
window._diffHunkAction = async function(btn, action) {
  const hunk = btn.closest('.diff-hunk');
  if (!hunk) return;

  const toolCall = hunk.closest('.tool-call');
  if (!toolCall) return;

  const sid = toolCall.dataset.sid;
  const fname = toolCall.dataset.toolCmd || '';
  const cleanPath = fname.replace(/^(write|edit)\s+/, '');

  if (action === 'accept') {
    hunk.classList.add('accepted');
    hunk.classList.remove('rejected');
  } else if (action === 'reject') {
    const removed = hunk.dataset.removed || '';
    const added = hunk.dataset.added || '';
    try {
      const res = await fetch('/api/revert-hunk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sid,
          path: cleanPath,
          old_text: added,
          new_text: removed,
        }),
      });
      const data = await res.json();
      if (data.ok) {
        hunk.classList.add('rejected');
        hunk.classList.remove('accepted');
        hunk.querySelectorAll('.diff-line.added, .diff-line.removed').forEach(line => {
          line.classList.remove('added', 'removed');
          line.classList.add('read-line');
        });
        const stats = toolCall.querySelector('[data-tc=diffstats]');
        const remaining = toolCall.querySelectorAll('.diff-hunk:not(.rejected)');
        if (stats) {
          let a = 0, r = 0;
          remaining.forEach(h => {
            a += (h.querySelectorAll('.diff-line.added') || []).length;
            r += (h.querySelectorAll('.diff-line.removed') || []).length;
          });
          let parts = [];
          if (a) parts.push('<span class="added-count">+' + a + '</span>');
          if (r) parts.push('<span class="removed-count">-' + r + '</span>');
          if (!parts.length) parts.push('<span style="color:var(--text-3);font-style:italic">' + _('reverted') + '</span>');
          stats.innerHTML = parts.join(' ');
        }
        if (!remaining.length) {
          const statusEl = toolCall.querySelector('[data-tc=status]');
          if (statusEl) {
            statusEl.className = 'tool-status error';
            statusEl.innerHTML = '<i class="bx bx-x" style="font-size:16px;"></i>';
          }
          toolCall.classList.add('reverted');
        }
      } else {
        console.warn('Revert failed:', data.error);
      }
    } catch (e) {
      console.warn('Revert error:', e);
    }
  }
};

window._acceptFile = function(btn) {
  const item = btn.closest('.file-summary-item');
  if (!item || item.classList.contains('accepted') || item.classList.contains('rejected')) return;
  item.classList.add('accepted');
